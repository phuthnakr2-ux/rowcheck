<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ClassFlow - ระบบจัดการชั้นเรียน</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Prompt', 'sans-serif'], sarabun: ['Sarabun', 'sans-serif'] },
          colors: { primary: '#6d28d9', secondary: '#8b5cf6', bgLight: '#f8fafc' }
        }
      }
    }
  </script>
  <style>
    body { background-color: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent;}
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    /* ==========================================
       PDF Export Styles (บีบฟอนต์ให้พอดี 40 บรรทัด/หน้า)
       ========================================== */
    .a4-print-container { width: 794px !important; height: 1123px !important; padding: 40px 50px; box-sizing: border-box; background-color: white; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden;}
    .pdf-header-title { font-size: 22px; font-weight: 700; color: #4c1d95; margin-bottom: 4px; font-family: 'Sarabun', sans-serif;}
    .pdf-header-subtitle { font-size: 16px; color: #7c3aed; font-family: 'Sarabun', sans-serif; font-weight: 600;}
    .pdf-header-right { font-size: 12px; color: #6b7280; text-align: right; font-family: 'Sarabun', sans-serif;}
    
    .pdf-table { width: 100% !important; border-collapse: collapse; margin-top: 10px; border: 1px solid #d8b4fe; font-family: 'Sarabun', sans-serif;}
    .pdf-table th { background-color: #6d28d9; color: white; font-weight: 700; font-size: 12px; padding: 4px; border: 1px solid #e9d5ff; text-align: center; height: 24px;}
    .pdf-table td { border: 1px solid #e9d5ff; vertical-align: middle; padding: 2px 4px; font-size: 11px; font-weight: 500; color: #334155; text-align: center; height: 21px !important;}
    .pdf-table td.text-left-pdf { text-align: left !important; padding-left: 10px !important;}
    
    .pdf-table tbody tr:nth-child(even) { background-color: #faf5ff; }
    .pdf-table tbody tr:nth-child(odd) { background-color: #ffffff; }
    
    .page-break { page-break-before: always; border-top: none; }
    
    .print-layer-hidden { display: none; }
    .print-layer-visible { display: block; position: absolute; top: 0; left: 0; z-index: -100; opacity: 0; pointer-events: none; }
    
    #qr-reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 16px; overflow: hidden; border: 2px dashed #cbd5e1; }
    #qr-reader video { object-fit: cover; }
  </style>
</head>
<body class="text-slate-800 antialiased font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, Component } = React;

    // --- 1. Error Boundary ---
    class ErrorBoundary extends Component {
      constructor(props) { super(props); this.state = { hasError: false }; }
      static getDerivedStateFromError(error) { return { hasError: true }; }
      componentDidCatch(error, errorInfo) { console.error("System Crash Prevented:", error); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="flex items-center justify-center min-h-screen bg-slate-50 p-4">
              <div className="bg-white p-8 rounded-[32px] shadow-xl text-center max-w-sm w-full border border-red-100">
                <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl"><i className="fas fa-exclamation-triangle"></i></div>
                <h1 className="text-xl font-black text-slate-800 mb-2">ระบบขัดข้อง</h1>
                <p className="text-sm text-slate-500 mb-6">ตรวจพบข้อผิดพลาด กรุณากดปุ่มด้านล่างเพื่อเริ่มการทำงานใหม่</p>
                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="w-full py-4 bg-red-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">ล้างข้อมูลและรีเซ็ตแอป</button>
              </div>
            </div>
          );
        }
        return this.props.children; 
      }
    }

    // --- 2. Utilities ---
    const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    const formatThaiDate = (dateStr) => { 
        if(!dateStr) return ''; const d = new Date(dateStr); if (isNaN(d.getTime())) return dateStr;
        const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
        return `${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()+543}`; 
    };

    const QRCodeCanvas = ({ text, size }) => {
        const qrRef = useRef(null);
        useEffect(() => { if (window.QRious && qrRef.current && text) new window.QRious({ element: qrRef.current, value: text, size: size, level: 'H' }); }, [text, size]);
        return <canvas ref={qrRef} style={{ width: size, height: size }} className="rounded-lg shadow-sm border border-slate-100"></canvas>;
    };

    const calculateBMI = (weight, height, name = '') => {
        const w = parseFloat(weight); const h = parseFloat(height);
        if (isNaN(w) || isNaN(h) || h <= 0) return { bmi: 0, label: '-', color: 'text-slate-400', bg: 'bg-slate-100', gender: 'unknown' };
        
        let gender = 'unknown';
        if(name.startsWith('นาย') || name.startsWith('เด็กชาย') || name.startsWith('ด.ช.')) gender = 'ชาย';
        else if(name.startsWith('นาง') || name.startsWith('นางสาว') || name.startsWith('เด็กหญิง') || name.startsWith('ด.ญ.')) gender = 'หญิง';

        const hMeters = h / 100; const bmi = (w / (hMeters * hMeters)).toFixed(1);
        let label = 'ผอมเกินไป'; let color = 'text-blue-600'; let bg = 'bg-blue-100';
        if (bmi >= 18.5 && bmi <= 22.9) { label = 'สมส่วน'; color = 'text-emerald-600'; bg = 'bg-emerald-100'; }
        else if (bmi >= 23 && bmi <= 24.9) { label = 'น้ำหนักเกิน'; color = 'text-amber-600'; bg = 'bg-amber-100'; }
        else if (bmi >= 25 && bmi <= 29.9) { label = 'อ้วน'; color = 'text-orange-600'; bg = 'bg-orange-100'; }
        else if (bmi >= 30) { label = 'อ้วนมาก'; color = 'text-red-600'; bg = 'bg-red-100'; }
        return { bmi, label, color, bg, gender };
    };

    let globalAudioContext = null;
    const playSound = (type) => {
      try {
        if (!globalAudioContext) globalAudioContext = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = globalAudioContext; if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'success') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'tap') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.05);
        }
      } catch(e) {}
    };

    const isActive = (s) => !s.status || s.status === 'active';

    // --- 3. Login Page ---
    const LoginPage = ({ onLogin, availableRooms, savedSession, onClearSession }) => {
      const [role, setRole] = useState('head'); 
      const [room, setRoom] = useState(availableRooms[0] || 'ม.1/1');
      const [pin, setPin] = useState('');
      const [rememberMe, setRememberMe] = useState(false);

      if (savedSession) {
          return (
              <div className="min-h-screen flex items-center justify-center p-5 bg-gradient-to-br from-[#f4f7fe] to-[#eef2fc]">
                  <div className="w-full max-w-[400px] bg-white rounded-[32px] shadow-2xl p-8 text-center relative border border-slate-100 z-10">
                      <button onClick={onClearSession} className="absolute top-4 right-4 w-8 h-8 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center hover:bg-slate-100"><i className="fas fa-times"></i></button>
                      <div className="w-20 h-20 bg-gradient-to-br from-[#6d28d9] to-[#8b5cf6] rounded-3xl flex items-center justify-center text-white mx-auto mb-6 shadow-lg shadow-primary/30">
                          <i className={`fas ${savedSession.role === 'admin' ? 'fa-shield-alt' : 'fa-user-graduate'} text-4xl`}></i>
                      </div>
                      <h2 className="text-2xl font-black text-slate-800 mb-1">ยินดีต้อนรับกลับมา</h2>
                      <p className="text-slate-500 text-sm mb-8">{savedSession.role === 'admin' ? 'โหมดผู้ดูแลระบบ' : `หัวหน้าห้อง ${savedSession.room}`}</p>
                      <button onClick={() => onLogin(savedSession, true)} className="w-full py-4 bg-[#6d28d9] text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all hover:bg-[#5b21b6] relative z-20">เข้าสู่ระบบต่อด้วยบัญชีนี้</button>
                  </div>
              </div>
          );
      }

      const handleLogin = (e) => {
        e.preventDefault();
        if (role === 'admin') {
            if(pin) onLogin({ role: 'admin', room: null, pin: pin }, rememberMe);
            else alert('กรุณาใส่รหัสผ่าน');
        } else {
            if (pin) onLogin({ role: 'head', room, pin: pin }, rememberMe);
            else alert('กรุณาใส่รหัสผ่าน (PIN)');
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-50 relative overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-pulse pointer-events-none"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-pulse pointer-events-none" style={{animationDelay: '2s'}}></div>

            <div className="max-w-5xl w-full bg-white lg:rounded-[36px] lg:shadow-2xl flex flex-col lg:flex-row overflow-hidden z-10 min-h-screen lg:min-h-[600px] animate-in fade-in zoom-in duration-500">
              
              <div className="w-full lg:w-5/12 bg-gradient-to-br from-[#6d28d9] via-blue-600 to-purple-700 p-10 text-white flex flex-col justify-between relative overflow-hidden hidden lg:flex">
                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full transform translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
                <div className="relative z-10">
                  <div className="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mb-6 backdrop-blur-md shadow-lg"><i className="fas fa-layer-group text-3xl"></i></div>
                  <h2 className="text-xs font-bold text-blue-200 tracking-widest mb-2 uppercase">Welcome to</h2>
                  <h1 className="text-5xl font-black mb-4 leading-tight">ClassFlow</h1>
                  <p className="text-blue-100 mb-10 text-base font-normal">ระบบบริหารจัดการชั้นเรียนครบวงจร</p>
                  
                  <div className="space-y-4">
                    <div className="flex items-center gap-4 bg-white/10 p-4 rounded-2xl backdrop-blur-sm"><div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center shrink-0"><i className="fas fa-clipboard-check text-blue-200"></i></div><div><h3 className="font-bold text-sm">เช็คชื่อหน้าเสาธง</h3><p className="text-blue-100 text-[11px] mt-0.5">สรุปยอดและส่งออก PDF พอดี A4</p></div></div>
                    <div className="flex items-center gap-4 bg-white/10 p-4 rounded-2xl backdrop-blur-sm"><div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center shrink-0"><i className="fas fa-wallet text-emerald-300"></i></div><div><h3 className="font-bold text-sm">จัดการกองทุนห้อง</h3><p className="text-blue-100 text-[11px] mt-0.5">ระบบติดตามการเก็บเงินที่แม่นยำ</p></div></div>
                    <div className="flex items-center gap-4 bg-white/10 p-4 rounded-2xl backdrop-blur-sm"><div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center shrink-0"><i className="fas fa-weight-scale text-rose-300"></i></div><div><h3 className="font-bold text-sm">ข้อมูลสุขภาพ</h3><p className="text-blue-100 text-[11px] mt-0.5">บันทึกและประมวลผล BMI อัตโนมัติ</p></div></div>
                  </div>
                </div>
              </div>

              <div className="w-full lg:w-7/12 p-6 md:p-12 flex flex-col justify-center bg-white relative flex-1">
                <div className="max-w-md w-full mx-auto relative z-20">
                  <div className="lg:hidden text-center mb-8">
                    <div className="w-16 h-16 bg-gradient-to-br from-[#6d28d9] to-[#8b5cf6] rounded-[20px] flex items-center justify-center text-white mx-auto mb-5 shadow-lg"><i className="fas fa-layer-group text-3xl"></i></div>
                    <h1 className="text-2xl font-black text-slate-800 tracking-tight">เข้าสู่ระบบ</h1>
                    <p className="text-slate-500 font-medium text-xs mt-1">จัดการข้อมูลห้องเรียนอย่างมีประสิทธิภาพ</p>
                  </div>

                  <div className="hidden lg:block mb-8">
                    <h2 className="text-3xl font-black text-slate-800 mb-2">เข้าสู่ระบบ</h2>
                    <p className="text-slate-500 font-normal text-sm">จัดการข้อมูลห้องเรียนได้อย่างเป็นระบบ</p>
                  </div>

                  <form onSubmit={handleLogin} className="space-y-6">
                    <div>
                      <label className="block text-xs font-bold text-slate-700 mb-3">สถานะผู้ใช้งาน</label>
                      <div className="grid grid-cols-2 gap-3">
                        <button type="button" onClick={() => setRole('head')} className={`p-4 rounded-2xl border-2 flex flex-col items-center justify-center gap-2 transition-all ${role === 'head' ? 'border-primary bg-indigo-50 text-primary' : 'border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                          <div className={`w-10 h-10 rounded-full flex items-center justify-center text-lg ${role === 'head' ? 'bg-primary text-white shadow-md' : 'bg-slate-100'}`}><i className="fas fa-user-graduate"></i></div><span className="font-bold text-sm">หัวหน้าห้อง</span>
                        </button>
                        <button type="button" onClick={() => setRole('admin')} className={`p-4 rounded-2xl border-2 flex flex-col items-center justify-center gap-2 transition-all ${role === 'admin' ? 'border-amber-500 bg-amber-50 text-amber-600' : 'border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                          <div className={`w-10 h-10 rounded-full flex items-center justify-center text-lg ${role === 'admin' ? 'bg-amber-500 text-white shadow-md' : 'bg-slate-100'}`}><i className="fas fa-shield-alt"></i></div><span className="font-bold text-sm">ผู้ดูแลระบบ</span>
                        </button>
                      </div>
                    </div>

                    <div className="space-y-4">
                      {role === 'head' ? (
                        <div>
                          <label className="block text-xs font-bold text-slate-700 mb-1">เลือกห้องเรียน</label>
                          <select value={room} onChange={(e) => setRoom(e.target.value)} className="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-bold focus:border-primary outline-none transition-colors cursor-pointer">
                            {availableRooms.map(r => <option key={r} value={r}>{r}</option>)}
                          </select>
                        </div>
                      ) : (
                        <div>
                          <label className="block text-xs font-bold text-slate-700 mb-1">Username</label>
                          <input type="text" placeholder="admin" className="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-bold focus:border-amber-500 outline-none transition-colors" />
                        </div>
                      )}
                      <div>
                        <label className="block text-xs font-bold text-slate-700 mb-1">รหัสความปลอดภัย (PIN)</label>
                        <input type="password" placeholder="รหัสผ่าน" value={pin} onChange={(e) => setPin(e.target.value)} className={`w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-bold tracking-widest outline-none transition-colors ${role === 'admin' ? 'focus:border-amber-500' : 'focus:border-primary'}`} />
                      </div>
                    </div>

                    <div className="flex items-center pl-1">
                        <input type="checkbox" id="rememberMeDesktop" checked={rememberMe} onChange={(e)=>setRememberMe(e.target.checked)} className="w-4 h-4 text-[#6d28d9] bg-slate-100 border-slate-300 rounded cursor-pointer accent-[#6d28d9]" />
                        <label htmlFor="rememberMeDesktop" className="ml-2 text-xs font-bold text-slate-500 cursor-pointer">จดจำการเข้าสู่ระบบไว้ในเครื่องนี้</label>
                    </div>

                    <button type="submit" className={`w-full py-4 rounded-xl text-white font-bold shadow-lg transition-all active:scale-95 relative z-30 ${role === 'admin' ? 'bg-amber-500 hover:bg-amber-600 shadow-amber-500/30' : 'bg-primary hover:bg-[#5b21b6] shadow-primary/30'}`}>เข้าสู่ระบบ</button>
                  </form>
                  
                  <div className="mt-8 text-center pt-6 border-t border-slate-100">
                      <p className="text-[10px] font-bold text-slate-500 mb-0.5">ออกแบบและพัฒนาโดย นายภูธนากร หงษ์ทอง</p>
                      <p className="text-[10px] text-slate-400">เลขานุการสภานักเรียน โรงเรียนคำม่วง</p>
                  </div>
                </div>
              </div>
            </div>
        </div>
      );
    };

    // --- 4. Admin Dashboard ---
    const AdminDashboard = ({ rooms, setRooms, enterRoom, onLogout }) => {
        const [newRoomBulk, setNewRoomBulk] = useState('');
        
        const handleAddBulk = () => {
            const lines = newRoomBulk.split('\n').map(l=>l.trim()).filter(Boolean);
            const toAdd = lines.filter(l => !rooms.includes(l));
            if(toAdd.length > 0) { setRooms([...rooms, ...toAdd]); setNewRoomBulk(''); }
        };

        const deleteRoom = (r) => { if(confirm(`ยืนยันการลบห้อง ${r} ใช่หรือไม่? ข้อมูลของห้องนี้จะหายไปทั้งหมด`)) setRooms(prev => prev.filter(x=>x!==r)); }
        const sortRooms = () => { setRooms(prev => [...prev].sort((a,b) => a.localeCompare(b, 'th', { numeric: true, sensitivity: 'base' }))); };
        
        const moveUp = (idx) => {
            if(idx === 0) return;
            setRooms(prev => { const newR = [...prev]; [newR[idx-1], newR[idx]] = [newR[idx], newR[idx-1]]; return newR; });
        };
        const moveDown = (idx) => {
            if(idx === rooms.length - 1) return;
            setRooms(prev => { const newR = [...prev]; [newR[idx+1], newR[idx]] = [newR[idx], newR[idx+1]]; return newR; });
        };

        return (
            <div className="min-h-screen bg-[#f8fafc] p-4 md:p-8 font-sans">
                <div className="max-w-5xl mx-auto">
                    <header className="flex justify-between items-center mb-6 bg-white p-6 rounded-[24px] shadow-sm border border-slate-100">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center text-2xl shadow-sm"><i className="fas fa-shield-alt"></i></div>
                            <div>
                                <h1 className="text-xl sm:text-2xl font-black text-slate-800">ระบบผู้ดูแลส่วนกลาง</h1>
                                <p className="text-slate-500 font-medium text-sm">จัดการห้องเรียนทั้งหมดในระบบ</p>
                            </div>
                        </div>
                        <button onClick={onLogout} className="px-4 py-2 bg-rose-50 text-rose-500 font-bold text-sm rounded-xl hover:bg-rose-100"><i className="fas fa-sign-out-alt sm:mr-1"></i> <span className="hidden sm:inline">ออกจากระบบ</span></button>
                    </header>

                    <div className="grid lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-1 bg-slate-800 p-6 rounded-[24px] shadow-lg text-white flex flex-col justify-start h-fit">
                            <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><i className="fas fa-plus-circle text-amber-400"></i> เพิ่มห้องเรียน</h3>
                            <textarea value={newRoomBulk} onChange={(e)=>setNewRoomBulk(e.target.value)} rows="4" placeholder="พิมพ์ชื่อห้องบรรทัดละห้อง&#10;ม.1/1&#10;ม.1/2" className="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white font-bold outline-none focus:border-amber-400 mb-3 text-sm custom-scrollbar"></textarea>
                            <button onClick={handleAddBulk} className="w-full py-3 bg-amber-500 text-slate-900 font-black rounded-xl hover:bg-amber-400 transition-colors shadow-md text-sm mb-4">เพิ่มเข้าสู่ระบบ</button>
                            <button onClick={sortRooms} className="w-full py-3 bg-white/10 text-white font-bold rounded-xl hover:bg-white/20 transition-colors text-sm border border-white/20"><i className="fas fa-sort-numeric-down mr-1"></i> จัดเรียงตามเลขห้อง</button>
                        </div>
                        
                        <div className="lg:col-span-2 flex flex-col gap-3 h-fit max-h-[80vh] overflow-y-auto custom-scrollbar pr-2">
                            {rooms.length === 0 ? <div className="p-8 text-center text-slate-400 bg-white rounded-[24px] border border-slate-200">ยังไม่มีห้องเรียนในระบบ</div> : 
                             rooms.map((r, idx) => (
                                <div key={r} className="bg-white p-3 sm:p-4 rounded-[20px] shadow-sm border border-slate-200 flex items-center justify-between group hover:border-primary transition-all">
                                    <button onClick={() => enterRoom(r)} className="flex items-center gap-4 flex-1 text-left">
                                        <div className="w-12 h-12 rounded-full bg-indigo-50 text-primary flex items-center justify-center text-xl group-hover:bg-primary group-hover:text-white transition-colors"><i className="fas fa-door-open"></i></div>
                                        <div><h3 className="text-lg font-black text-slate-800">ห้อง {r}</h3><p className="text-[11px] text-slate-400">กดเพื่อเข้าดูข้อมูล / ตั้งค่า</p></div>
                                    </button>
                                    <div className="flex items-center gap-1.5 ml-2">
                                        <div className="flex flex-col gap-1 mr-2">
                                            <button onClick={()=>moveUp(idx)} className="w-6 h-6 bg-slate-50 text-slate-400 hover:bg-slate-200 rounded flex items-center justify-center text-xs"><i className="fas fa-chevron-up"></i></button>
                                            <button onClick={()=>moveDown(idx)} className="w-6 h-6 bg-slate-50 text-slate-400 hover:bg-slate-200 rounded flex items-center justify-center text-xs"><i className="fas fa-chevron-down"></i></button>
                                        </div>
                                        <button onClick={() => deleteRoom(r)} className="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all"><i className="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        )
    };

    // --- 5. TABS ---
    const TabDashboard = ({ activeStudentsCount, records, currentDate, funds, activeStudents }) => {
        const [dashTab, setDashTab] = useState('overview'); 
        const [searchQuery, setSearchQuery] = useState('');
        const [startDate, setStartDate] = useState(() => { const d = new Date(); d.setDate(1); return d.toISOString().split('T')[0]; });
        const [endDate, setEndDate] = useState(currentDate);

        const todayRecord = records.find(r=>r.date === currentDate);
        let p=0, a=0, e=0;
        if (todayRecord && todayRecord.data) {
            Object.keys(todayRecord.data).forEach(sid => {
                const s = activeStudents.find(st=>st.id===sid);
                if(s && isActive(s)) {
                    const v = todayRecord.data[sid];
                    if(v==='present') p++; else if(v==='absent') a++; else if(v==='excused') e++;
                }
            });
        }
        
        const maxAtt = activeStudentsCount > 0 ? activeStudentsCount : 1;
        const pPercent = Math.round((p/maxAtt)*100);
        const aPercent = Math.round((a/maxAtt)*100);
        const ePercent = Math.round((e/maxAtt)*100);

        let totalFundCollected = 0; 
        const latestFund = funds[0];
        let fPaid = 0;
        if (latestFund) {
            Object.keys(latestFund.payments || {}).forEach(sid => {
                const s = activeStudents.find(st => st.id === sid);
                if(!s || !isActive(s)) return; 
                const data = latestFund.payments[sid];
                let amt = typeof data === 'object' ? (parseFloat(data.amount)||0) : (typeof data === 'number' ? data : 0);
                totalFundCollected += amt;
                if(amt >= parseFloat(latestFund.amount)) fPaid++;
            });
        }
        const fPercent = activeStudentsCount > 0 && latestFund ? Math.round((fPaid/activeStudentsCount)*100) : 0;

        return (
          <div className="animate-in fade-in space-y-6">
            <h1 className="text-2xl font-black text-slate-800">แดชบอร์ดสรุปข้อมูล</h1>
            <div className="flex bg-white p-1.5 rounded-xl shadow-sm border border-slate-100 w-fit overflow-x-auto max-w-full">
                <button onClick={() => setDashTab('overview')} className={`px-4 py-2 rounded-lg text-[13px] font-bold transition-all whitespace-nowrap ${dashTab === 'overview' ? 'bg-[#f4ebff] text-primary' : 'text-slate-500 hover:bg-slate-50'}`}><i className="fas fa-chart-pie mr-1"></i> ภาพรวม</button>
                <button onClick={() => setDashTab('history')} className={`px-4 py-2 rounded-lg text-[13px] font-bold transition-all whitespace-nowrap ${dashTab === 'history' ? 'bg-[#f4ebff] text-primary' : 'text-slate-500 hover:bg-slate-50'}`}><i className="fas fa-history mr-1"></i> ประวัติเข้าแถว</button>
                <button onClick={() => setDashTab('fundStatus')} className={`px-4 py-2 rounded-lg text-[13px] font-bold transition-all whitespace-nowrap ${dashTab === 'fundStatus' ? 'bg-[#f4ebff] text-primary' : 'text-slate-500 hover:bg-slate-50'}`}><i className="fas fa-search-dollar mr-1"></i> เช็คกองทุน</button>
            </div>

            {dashTab === 'overview' && (
                <div className="space-y-6 animate-in fade-in">
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                        <div className="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center text-xl"><i className="fas fa-users"></i></div>
                        <div><p className="text-[11px] font-bold text-slate-400 uppercase">นักเรียนปกติ</p><p className="text-2xl font-black text-slate-700">{activeStudentsCount}</p></div>
                      </div>
                      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                        <div className="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl"><i className="fas fa-check-circle"></i></div>
                        <div><p className="text-[11px] font-bold text-slate-400 uppercase">มาเรียนวันนี้</p><p className="text-2xl font-black text-slate-700">{todayRecord ? p : '-'}</p></div>
                      </div>
                      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                        <div className="w-12 h-12 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-xl"><i className="fas fa-coins"></i></div>
                        <div><p className="text-[11px] font-bold text-slate-400 uppercase">กองทุนห้องรวม</p><p className="text-2xl font-black text-slate-700">{totalFundCollected.toLocaleString()}฿</p></div>
                      </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100">
                            <h3 className="font-black text-slate-800 mb-4"><i className="fas fa-chart-bar text-primary mr-2"></i> สถิติการเข้าแถววันนี้</h3>
                            {todayRecord ? (
                                <div className="space-y-4 mt-6">
                                    <div>
                                        <div className="flex justify-between text-xs font-bold mb-1"><span className="text-emerald-600">มาเรียน ({p} คน)</span><span className="text-slate-500">{pPercent}%</span></div>
                                        <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div className="bg-emerald-500 h-full rounded-full" style={{width: `${pPercent}%`}}></div></div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-xs font-bold mb-1"><span className="text-red-500">ขาดเรียน ({a} คน)</span><span className="text-slate-500">{aPercent}%</span></div>
                                        <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div className="bg-red-500 h-full rounded-full" style={{width: `${aPercent}%`}}></div></div>
                                    </div>
                                </div>
                            ) : (<div className="py-10 text-center text-slate-400 text-sm font-medium border-2 border-dashed border-slate-100 rounded-xl">ยังไม่มีการเช็คชื่อวันนี้</div>)}
                        </div>
                        <div className="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100">
                            <h3 className="font-black text-slate-800 mb-4"><i className="fas fa-wallet text-amber-500 mr-2"></i> รายการเก็บเงินล่าสุด</h3>
                            {latestFund ? (
                                <div className="mt-2">
                                    <div className="p-4 bg-orange-50 rounded-xl border border-orange-100 mb-4">
                                        <h4 className="font-bold text-orange-800">{latestFund.title}</h4>
                                        <p className="text-xs text-orange-600 mb-3 mt-1">เป้าหมาย: คนละ {latestFund.amount} บาท</p>
                                        <div className="flex justify-between text-xs font-bold mb-1"><span className="text-orange-700">จ่ายครบแล้ว {fPaid} / {activeStudentsCount} คน</span><span className="text-orange-700">{fPercent}%</span></div>
                                        <div className="w-full bg-orange-200 rounded-full h-2 overflow-hidden"><div className="bg-orange-500 h-full rounded-full" style={{width: `${fPercent}%`}}></div></div>
                                    </div>
                                </div>
                            ) : (<div className="py-10 text-center text-slate-400 text-sm font-medium border-2 border-dashed border-slate-100 rounded-xl">ยังไม่มีรายการเก็บเงิน</div>)}
                        </div>
                    </div>
                </div>
            )}
            
            {dashTab === 'history' && (
                <div className="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100 animate-in fade-in">
                    <h3 className="font-black text-slate-800 mb-4"><i className="fas fa-search text-primary mr-2"></i> ประวัติการเข้าแถว (ค้นหาตามช่วงเวลา)</h3>
                    <div className="flex flex-col md:flex-row gap-3 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <div className="flex-1">
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">ตั้งแต่วันที่</label>
                            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm font-bold outline-none focus:border-primary" />
                        </div>
                        <div className="flex-1">
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">ถึงวันที่</label>
                            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm font-bold outline-none focus:border-primary" />
                        </div>
                        <div className="flex-[2]">
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">ค้นหา (ชื่อ / รหัส)</label>
                            <input type="text" placeholder="พิมพ์ชื่อนักเรียน..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm font-bold outline-none focus:border-primary" />
                        </div>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left border border-slate-200">
                            <thead className="text-xs text-slate-500 bg-slate-100 uppercase border-b border-slate-200">
                                <tr><th className="px-4 py-3">เลขที่/รหัส</th><th className="px-4 py-3">ชื่อ - สกุล</th><th className="px-4 py-3 text-center text-emerald-600">มาเรียน</th><th className="px-4 py-3 text-center text-red-500">ขาดเรียน</th><th className="px-4 py-3 text-center text-blue-500">ลา</th></tr>
                            </thead>
                            <tbody>
                                {(() => {
                                    const filteredRecords = records.filter(r => r.date >= startDate && r.date <= endDate);
                                    let stats = {};
                                    activeStudents.forEach(s => { stats[s.id] = { p:0, a:0, e:0 }; });
                                    filteredRecords.forEach(rec => {
                                        if(!rec.data) return;
                                        Object.keys(rec.data).forEach(sid => {
                                            if(!stats[sid]) return;
                                            if(rec.data[sid] === 'present') stats[sid].p++;
                                            else if(rec.data[sid] === 'absent') stats[sid].a++;
                                            else if(rec.data[sid] === 'excused') stats[sid].e++;
                                        });
                                    });
                                    const displayList = activeStudents.filter(s => s.name.includes(searchQuery) || ((s.code||'').includes(searchQuery)));
                                    if(displayList.length === 0) return <tr><td colSpan="5" className="text-center py-8 text-slate-400">ไม่พบข้อมูล</td></tr>;
                                    return displayList.map(s => (
                                        <tr key={s.id} className="border-b border-slate-100 hover:bg-slate-50">
                                            <td className="px-4 py-3 font-medium text-slate-500">{s.number} <span className="text-[10px] bg-slate-200 px-1 rounded ml-1">{s.code}</span></td>
                                            <td className="px-4 py-3 font-bold text-slate-700">{s.name}</td>
                                            <td className="px-4 py-3 text-center font-black text-emerald-600">{stats[s.id].p}</td>
                                            <td className="px-4 py-3 text-center font-black text-red-500">{stats[s.id].a}</td>
                                            <td className="px-4 py-3 text-center font-black text-blue-500">{stats[s.id].e}</td>
                                        </tr>
                                    ));
                                })()}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
            
            {dashTab === 'fundStatus' && (
                <div className="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100 animate-in fade-in">
                    <h3 className="font-black text-slate-800 mb-4"><i className="fas fa-search-dollar text-amber-500 mr-2"></i> ตรวจสอบสถานะกองทุน</h3>
                    {funds.length === 0 ? <p className="text-slate-500 text-center py-8">ยังไม่มีแคมเปญกองทุน</p> : (
                        <div>
                            <div className="flex flex-col sm:flex-row gap-3 mb-6">
                                <select className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold flex-1 outline-none">
                                    {funds.map(f => <option key={f.id} value={f.id}>{f.title} (เป้าหมาย {f.amount}฿)</option>)}
                                </select>
                                <input type="text" placeholder="ค้นหาชื่อ..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none flex-[2]" />
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left border border-slate-200">
                                    <thead className="text-xs text-slate-500 bg-slate-100 uppercase border-b border-slate-200">
                                        <tr><th className="px-4 py-3">เลขที่/รหัส</th><th className="px-4 py-3">ชื่อ - สกุล</th><th className="px-4 py-3">ยอดที่จ่าย</th><th className="px-4 py-3">สถานะ</th></tr>
                                    </thead>
                                    <tbody>
                                        {(() => {
                                            const f = latestFund; if(!f) return null;
                                            const displayList = activeStudents.filter(s => s.name.includes(searchQuery) || ((s.code||'').includes(searchQuery)));
                                            if(displayList.length === 0) return <tr><td colSpan="4" className="text-center py-8 text-slate-400">ไม่พบข้อมูล</td></tr>;
                                            return displayList.map(s => {
                                                const pData = (f.payments || {})[s.id];
                                                let paid = 0; let method = 'สด';
                                                if (typeof pData === 'object' && pData !== null) { paid = pData.amount || 0; method = pData.method === 'transfer' ? 'โอน' : 'สด';}
                                                else if (typeof pData === 'number') paid = pData;
                                                const target = parseFloat(f.amount) || 0;
                                                return (
                                                    <tr key={s.id} className="border-b border-slate-200 hover:bg-slate-50">
                                                        <td className="px-4 py-3 font-medium text-slate-500">{s.number}</td>
                                                        <td className="px-4 py-3 font-bold text-slate-700">{s.name}</td>
                                                        <td className="px-4 py-3 font-bold">{paid} <span className="text-xs text-slate-400 font-normal">/ {target} <span className="text-[10px]">({method})</span></span></td>
                                                        <td className="px-4 py-3">{paid >= target ? <span className="px-2 py-1 bg-emerald-100 text-emerald-700 rounded-md text-[10px] font-bold">จ่ายครบ</span> : <span className="px-2 py-1 bg-red-100 text-red-700 rounded-md text-[10px] font-bold">ค้างจ่าย</span>}</td>
                                                    </tr>
                                                );
                                            });
                                        })()}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            )}
          </div>
        );
    };

    const TabAttendance = ({ sortedStudents, activeStudentsCount, attendance, setAttendance, isLocked, setIsLocked, currentDate, setCurrentDate, saveAtt, tempNotes, setTempNotes, executeDocExport, exportExcel, showToast }) => {
        const [attTab, setAttTab] = useState('manual'); 
        let p=0, a=0, e=0;
        sortedStudents.forEach(s => { if(isActive(s)) { const st = attendance[s.id]; if(st==='present') p++; else if(st==='absent') a++; else if(st==='excused') e++; }});

        const toggleAll = () => {
            if (isLocked) return; playSound('tap');
            const allPresent = activeStudentsCount > 0 && sortedStudents.filter(isActive).every(s => attendance[s.id] === 'present');
            if(allPresent) setAttendance({}); 
            else { const newAtt = {...attendance}; sortedStudents.forEach(s => { if(isActive(s)) newAtt[s.id] = 'present'; }); setAttendance(newAtt); }
        };

        useEffect(() => {
            let html5QrCode;
            if (attTab === 'scan') {
                html5QrCode = new Html5Qrcode("qr-reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        const student = sortedStudents.find(s => s.code === decodedText || s.id === decodedText);
                        if (student && isActive(student)) {
                            setAttendance(prev => {
                                if(prev[student.id] !== 'present') {
                                    playSound('success'); showToast(`สแกนผ่าน: ${student.name}`);
                                    return {...prev, [student.id]: 'present'};
                                }
                                return prev;
                            });
                        }
                    }, (errorMessage) => {}
                ).catch((err) => { showToast("ไม่สามารถเปิดกล้องได้"); });
            }
            return () => { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().then(() => html5QrCode.clear()).catch(e=>{}); };
        }, [attTab, sortedStudents, showToast, setAttendance]);

        return (
          <div className="animate-in fade-in space-y-4 max-w-[600px] mx-auto">
             <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-100">
                 <button onClick={()=>{playSound('tap'); setAttTab('manual');}} className={`flex-1 py-2.5 rounded-lg text-[13px] font-bold transition-all ${attTab === 'manual' ? 'bg-[#f4ebff] text-primary shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}><i className="fas fa-list-ul mr-1"></i> เช็คชื่อรายบุคคล</button>
                 <button onClick={()=>{playSound('tap'); setAttTab('scan');}} className={`flex-1 py-2.5 rounded-lg text-[13px] font-bold transition-all ${attTab === 'scan' ? 'bg-[#f4ebff] text-primary shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}><i className="fas fa-qrcode mr-1"></i> สแกนกล้อง</button>
             </div>

             <div className="bg-white p-4 md:p-5 rounded-[20px] shadow-sm border border-slate-100">
                 <div className="flex justify-between items-start mb-4">
                     <div className="flex items-center gap-2">
                         <div className="w-8 h-8 bg-primary text-white rounded-lg flex items-center justify-center shadow-sm"><i className="fas fa-calendar-check text-sm"></i></div>
                         <div><h1 className="text-[16px] font-black text-slate-800">เช็คชื่อหน้าเสาธง</h1><p className="text-[11px] text-slate-400 font-bold mt-0.5">รวมนักเรียนปกติ {activeStudentsCount} คน</p></div>
                     </div>
                     <div className="relative">
                        <div className="bg-[#f4ebff] text-primary px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm cursor-pointer whitespace-nowrap">{formatThaiDate(currentDate)}</div>
                        <input type="date" value={currentDate} onChange={e=>{playSound('tap'); setCurrentDate(e.target.value);}} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                     </div>
                 </div>

                 <div className="grid grid-cols-3 gap-2 mb-3">
                     <div className="bg-[#ecfdf3] text-[#10b981] border border-[#d1fae5] rounded-xl py-2 text-center font-bold text-sm">มา {p}</div>
                     <div className="bg-[#fef2f2] text-[#ef4444] border border-[#fee2e2] rounded-xl py-2 text-center font-bold text-sm">ขาด {a}</div>
                     <div className="bg-[#eff6ff] text-[#3b82f6] border border-[#dbeafe] rounded-xl py-2 text-center font-bold text-sm">ลา {e}</div>
                 </div>
                 
                 <div className="flex gap-2 mb-3">
                     <button onClick={toggleAll} disabled={isLocked} className={`flex-1 py-2.5 border rounded-xl font-bold text-xs transition-all flex items-center justify-center gap-1.5 ${isLocked ? 'bg-slate-50 border-slate-100 text-slate-400' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}><i className="fas fa-check-double"></i> มาครบทุกคน</button>
                     {isLocked ? (
                         <button onClick={() => {playSound('tap'); setIsLocked(false);}} className="flex-[1.5] py-2.5 bg-[#1e293b] text-white rounded-xl font-bold text-xs shadow-md hover:bg-black transition-all"><i className="fas fa-lock mr-1 text-slate-300"></i> บันทึกแล้ว (กดแก้)</button>
                     ) : (
                         <button onClick={saveAtt} className="flex-[1.5] py-2.5 bg-primary text-white rounded-xl font-bold text-xs shadow-md hover:bg-[#5b21b6] transition-all"><i className="fas fa-save mr-1"></i> บันทึกข้อมูล</button>
                     )}
                 </div>

                 <div className="grid grid-cols-3 gap-2 pt-3 border-t border-slate-100 border-dashed">
                    <button onClick={() => executeDocExport('pdf', 'pdf-report-container', `เช็คชื่อหน้าเสาธง_${currentDate}`)} className="py-2 bg-red-50/50 text-red-600 rounded-xl text-[11px] font-bold hover:bg-red-50 transition border border-red-100/50"><i className="fas fa-file-pdf"></i> PDF</button>
                    <button onClick={() => executeDocExport('img', 'pdf-report-container', `เช็คชื่อหน้าเสาธง_${currentDate}`)} className="py-2 bg-blue-50/50 text-blue-600 rounded-xl text-[11px] font-bold hover:bg-blue-50 transition border border-blue-100/50"><i className="fas fa-image"></i> รูปภาพ</button>
                    <button onClick={() => exportExcel('attendance')} className="py-2 bg-green-50/50 text-green-600 rounded-xl text-[11px] font-bold hover:bg-green-50 transition border border-green-100/50"><i className="fas fa-file-excel"></i> Excel</button>
                 </div>
             </div>

             {attTab === 'scan' ? (
                 <div className="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
                     <h3 className="font-black text-slate-800 mb-4">หันกล้องไปที่ QR Code ของนักเรียน</h3>
                     <div id="qr-reader"></div>
                 </div>
             ) : (
                 <div className="space-y-2.5 mt-2 pb-10">
                    {sortedStudents.length === 0 ? <p className="text-center text-slate-400 text-sm py-8 border border-dashed rounded-xl border-slate-200">ไม่มีรายชื่อนักเรียน</p> : 
                     sortedStudents.map(s => {
                        const active = isActive(s);
                        const st = attendance[s.id];
                        const setDirectStatus = (status) => { if (isLocked || !active) return; playSound('tap'); setAttendance(prev => ({...prev, [s.id]: prev[s.id] === status ? undefined : status})); };

                        return (
                            <div key={s.id} className={`bg-white p-3 rounded-[16px] shadow-sm border border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-2 hover:border-primary transition-colors ${!active ? 'opacity-60 bg-slate-50' : ''}`}>
                                <div className="flex items-center gap-3">
                                    <div className="w-6 h-6 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center font-bold text-[10px] shrink-0">{s.number || ''}</div>
                                    <div className="flex flex-col">
                                        <p className="font-bold text-slate-800 text-[14px]">
                                            <span style={{ textDecoration: !active ? 'line-through' : 'none' }}>{s.name || ''}</span>
                                            {!active && <span className="text-[10px] text-red-500 ml-2">({s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน'})</span>}
                                        </p>
                                        {!isLocked && active && (st === 'absent' || st === 'excused') && (
                                            <div className="flex items-center gap-1 mt-1 text-slate-400 w-full">
                                                <i className="fas fa-comment-dots text-[9px]"></i>
                                                <input type="text" placeholder="พิมพ์หมายเหตุ..." value={tempNotes[s.id]||''} onChange={e=>setTempNotes(p=>({...p, [s.id]: e.target.value}))} className="text-[11px] bg-transparent outline-none w-full max-w-[180px] border-b border-slate-200 pb-0.5 focus:border-primary text-slate-600" />
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex bg-slate-50/80 p-1 rounded-[10px] shrink-0 self-end sm:self-auto border border-slate-100 mt-2 sm:mt-0">
                                    <button onClick={() => setDirectStatus('present')} disabled={!active} className={`w-[45px] py-1.5 rounded-lg text-[11px] font-bold transition-all ${st==='present'?'bg-[#10b981] text-white shadow-sm':'text-slate-400 hover:bg-white'} ${!active ? 'cursor-not-allowed opacity-50' : ''}`}>มา</button>
                                    <button onClick={() => setDirectStatus('absent')} disabled={!active} className={`w-[45px] py-1.5 rounded-lg text-[11px] font-bold transition-all ${st==='absent'?'bg-[#ef4444] text-white shadow-sm':'text-slate-400 hover:bg-white'} ${!active ? 'cursor-not-allowed opacity-50' : ''}`}>ขาด</button>
                                    <button onClick={() => setDirectStatus('excused')} disabled={!active} className={`w-[45px] py-1.5 rounded-lg text-[11px] font-bold transition-all ${st==='excused'?'bg-[#3b82f6] text-white shadow-sm':'text-slate-400 hover:bg-white'} ${!active ? 'cursor-not-allowed opacity-50' : ''}`}>ลา</button>
                                </div>
                            </div>
                        )
                    })}
                 </div>
             )}
          </div>
        );
    };

    const TabFund = ({ funds, setFunds, sortedStudents, activeStudentsCount, showToast, exportExcel, executeDocExport }) => {
        const [newTitle, setNewTitle] = useState(''); const [newAmount, setNewAmount] = useState('');
        const [activeFundId, setActiveFundId] = useState(funds[0]?.id || null);

        useEffect(() => { if(!activeFundId && funds.length > 0) setActiveFundId(funds[0].id); }, [funds]);

        const addFund = () => {
            if(!newTitle.trim() || !newAmount) return; playSound('tap');
            const amt = parseFloat(newAmount) || 0;
            const newFund = { id: generateId(), title: newTitle.trim(), amount: amt, payments: {}, date: new Date().toISOString(), isLocked: false };
            setFunds([newFund, ...funds]); setNewTitle(''); setNewAmount(''); setActiveFundId(newFund.id); showToast('สร้างรายการสำเร็จ');
        };

        const activeFund = funds.find(f => f.id === activeFundId) || funds[0];

        const toggleFundLock = () => {
            playSound('tap');
            if(confirm(`ยืนยันการ${!activeFund.isLocked ? 'ล็อก' : 'ปลดล็อก'}รายการเก็บเงินนี้?`)) {
                setFunds(prev => prev.map(f => f.id === activeFund.id ? { ...f, isLocked: !f.isLocked } : f));
                showToast(!activeFund.isLocked ? 'บันทึกและล็อกข้อมูลแล้ว' : 'ปลดล็อกแก้ไขได้');
            }
        };

        const updatePayment = (studentId, amount, method) => {
            if(activeFund.isLocked) return;
            setFunds(prev => prev.map(f => {
                if (f.id === activeFund.id) { 
                    const currentPayments = f.payments || {};
                    return { ...f, payments: { ...currentPayments, [studentId]: { amount: amount, method: method } } }; 
                } 
                return f;
            }));
        };

        return (
          <div className="animate-in fade-in space-y-6 max-w-[600px] mx-auto">
            <div className="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100">
                <h3 className="font-black text-sm text-slate-800 mb-3 flex items-center gap-2"><div className="w-8 h-8 rounded-full bg-amber-100 text-amber-500 flex items-center justify-center text-sm"><i className="fas fa-plus"></i></div> สร้างรายการเก็บเงิน</h3>
                <div className="flex flex-col sm:flex-row gap-2">
                    <input type="text" placeholder="ชื่อรายการ" value={newTitle} onChange={e=>setNewTitle(e.target.value)} className="flex-[2] px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none text-sm" />
                    <div className="flex-1 relative">
                        <input type="number" placeholder="จำนวนเงิน" value={newAmount} onChange={e=>setNewAmount(e.target.value)} className="w-full pl-4 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none text-sm" />
                        <span className="absolute right-3 top-2.5 text-sm font-bold text-slate-400 pointer-events-none">฿</span>
                    </div>
                    <button onClick={addFund} className="bg-[#1e293b] text-white font-bold px-6 py-2.5 rounded-xl shadow-md text-sm hover:bg-black transition-colors">สร้าง</button>
                </div>
            </div>

            {funds.length > 0 && (
                <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                    {funds.map(f => (
                        <button key={f.id} onClick={()=>{playSound('tap'); setActiveFundId(f.id);}} className={`shrink-0 px-4 py-2 rounded-xl font-bold text-xs border transition-all shadow-sm ${activeFund?.id === f.id ? 'border-amber-500 bg-amber-50 text-amber-600' : 'border-slate-200 bg-white text-slate-500 hover:bg-slate-50'}`}>
                            {f.title} {f.isLocked ? <i className="fas fa-lock ml-1 opacity-50"></i> : ''}
                        </button>
                    ))}
                </div>
            )}

            {activeFund ? (() => {
                let collected = 0; 
                Object.keys(activeFund.payments || {}).forEach(sid => {
                    if(!isActive(sortedStudents.find(s=>s.id===sid) || {})) return; 
                    const p = activeFund.payments[sid];
                    if(typeof p === 'object') collected += (parseFloat(p.amount) || 0); 
                    else if(typeof p === 'number') collected += p;
                });
                const totalTarget = activeStudentsCount * (parseFloat(activeFund.amount) || 0);
                const percent = totalTarget > 0 ? Math.round((collected/totalTarget)*100) : 0;
                const isLocked = activeFund.isLocked;

                return (
                    <div className="bg-white rounded-[20px] shadow-sm border border-slate-100 overflow-hidden pb-6">
                        <div className="bg-gradient-to-br from-amber-500 to-orange-500 p-6 text-white relative overflow-hidden">
                            <div className="relative z-10 flex justify-between items-start mb-6">
                                <div><h2 className="text-xl font-black mb-1">{activeFund.title}</h2></div>
                                <div className="text-right">
                                    <p className="text-2xl font-black">{collected.toLocaleString()} <span className="text-sm opacity-80">/ {totalTarget.toLocaleString()} ฿</span></p>
                                    <button onClick={()=>{ if(confirm('ยืนยันการลบรายการนี้ใช่หรือไม่? ข้อมูลทั้งหมดจะถูกลบ')) { setFunds(funds.filter(x=>x.id!==activeFund.id)); setActiveFundId(null); } }} className="text-orange-100 text-[10px] hover:text-white mt-1"><i className="fas fa-trash"></i> ลบรายการ</button>
                                </div>
                            </div>
                            <div className="relative z-10 flex items-center gap-3">
                                <div className="flex-1 bg-black/20 rounded-full h-2 overflow-hidden"><div className="bg-white h-full rounded-full" style={{width: `${percent > 100 ? 100 : percent}%`}}></div></div>
                                <span className="font-black text-xs">{percent}%</span>
                            </div>
                        </div>

                        <div className="p-4 border-b border-slate-100 bg-slate-50/50">
                             <div className="flex gap-2">
                                 {isLocked ? (
                                     <button onClick={toggleFundLock} className="flex-1 py-2.5 bg-[#1e293b] text-white rounded-xl font-bold text-xs shadow-md hover:bg-black transition-all"><i className="fas fa-lock mr-1 text-slate-300"></i> ล็อกแล้ว (กดปลดล็อก)</button>
                                 ) : (
                                     <button onClick={toggleFundLock} className="flex-1 py-2.5 bg-amber-500 text-white rounded-xl font-bold text-xs shadow-md hover:bg-amber-600 transition-all"><i className="fas fa-save mr-1"></i> บันทึกและล็อกข้อมูล</button>
                                 )}
                             </div>
                             <div className="grid grid-cols-3 gap-2 pt-3 mt-3 border-t border-slate-200 border-dashed">
                                <button onClick={() => executeDocExport('pdf', 'pdf-fund-container', `กองทุน_${activeFund.title}`)} className="py-2 bg-red-50/50 text-red-600 rounded-xl text-[11px] font-bold hover:bg-red-50 border border-red-100/50"><i className="fas fa-file-pdf"></i> PDF</button>
                                <button onClick={() => executeDocExport('img', 'pdf-fund-container', `กองทุน_${activeFund.title}`)} className="py-2 bg-blue-50/50 text-blue-600 rounded-xl text-[11px] font-bold hover:bg-blue-50 border border-blue-100/50"><i className="fas fa-image"></i> รูปภาพ</button>
                                <button onClick={() => exportExcel('fund')} className="py-2 bg-green-50/50 text-green-600 rounded-xl text-[11px] font-bold hover:bg-green-50 border border-green-100/50"><i className="fas fa-file-excel"></i> Excel</button>
                             </div>
                        </div>

                        <div className="p-3 space-y-1 max-h-[400px] overflow-y-auto">
                            {sortedStudents.map(s => {
                                const active = isActive(s);
                                const paymentData = (activeFund.payments || {})[s.id];
                                let currentPaid = 0; let method = 'เงินสด';
                                if (typeof paymentData === 'object' && paymentData !== null) { currentPaid = paymentData.amount || 0; method = paymentData.method || 'เงินสด'; } 
                                else if (typeof paymentData === 'number') { currentPaid = paymentData; } 

                                const targetAmount = parseFloat(activeFund.amount) || 0;
                                const isFullyPaid = currentPaid >= targetAmount;

                                const toggleFullPayment = () => { if(isLocked || !active) return; playSound('tap'); updatePayment(s.id, isFullyPaid ? 0 : targetAmount, method); };
                                const toggleMethod = () => { if(isLocked || !active) return; playSound('tap'); updatePayment(s.id, currentPaid, method === 'เงินสด' ? 'โอน' : 'เงินสด'); };

                                return (
                                    <div key={s.id} className={`flex justify-between items-center p-3 rounded-xl border transition-all ${isFullyPaid ? 'bg-emerald-50/30 border-emerald-100/50' : 'hover:bg-slate-50 border-slate-50'} ${!active ? 'opacity-60 grayscale' : ''}`}>
                                        <div className="flex items-center gap-3 w-1/2">
                                            <button onClick={toggleFullPayment} disabled={isLocked || !active} className={`w-5 h-5 rounded-full flex items-center justify-center border-2 transition-colors shrink-0 ${isFullyPaid ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 bg-white'} ${!active ? 'cursor-not-allowed' : ''}`}><i className="fas fa-check text-[8px]"></i></button>
                                            <span className="text-slate-400 font-bold text-xs w-5 shrink-0">{s.number || ''}.</span>
                                            <span className={`font-bold text-[13px] truncate ${isFullyPaid ? 'text-emerald-700' : 'text-slate-700'}`} style={{ textDecoration: !active ? 'line-through' : 'none' }}>{s.name || ''}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <button onClick={toggleMethod} disabled={isLocked || !active} className={`px-2 py-1.5 rounded-lg text-[10px] font-bold shrink-0 border ${method === 'โอน' ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-slate-100 text-slate-500 border-slate-200'} ${!active ? 'cursor-not-allowed' : ''}`}>{method}</button>
                                            <div className="relative w-[65px]">
                                                <input type="number" disabled={isLocked || !active} value={currentPaid === 0 ? '' : currentPaid} onChange={e=>{let v = parseFloat(e.target.value); updatePayment(s.id, isNaN(v)?0:v, method);}} placeholder="0" className={`w-full p-1.5 text-right font-bold text-xs rounded-lg border outline-none ${isLocked || !active ? 'bg-transparent border-transparent text-slate-500' : 'bg-white border-slate-200 focus:border-amber-400 text-slate-800'}`} />
                                            </div>
                                            <button onClick={toggleFullPayment} disabled={isLocked || !active} className={`text-[10px] font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 px-2 py-1.5 rounded-md ${!active ? 'cursor-not-allowed opacity-50' : ''}`}>พอดี</button>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                )
            })() : (
                <div className="bg-white p-10 rounded-[24px] shadow-sm border border-slate-100 text-center">
                    <div className="w-16 h-16 bg-amber-50 rounded-full flex items-center justify-center mx-auto mb-3"><i className="fas fa-wallet text-2xl text-amber-400"></i></div>
                    <p className="text-slate-600 font-bold text-sm">ยังไม่มีรายการเก็บเงิน</p>
                </div>
            )}
          </div>
        );
    };

    const TabHealth = ({ healthRecords, setHealthRecords, sortedStudents, exportExcel, executeDocExport, showToast }) => {
        const [currentHealthDate, setCurrentHealthDate] = useState(() => {
            const today = new Date(); return `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`; 
        });

        const activeHealthRecord = healthRecords.find(r => r.date === currentHealthDate) || { date: currentHealthDate, data: {}, isLocked: false };
        const healthData = activeHealthRecord.data || {};
        const isHealthLocked = activeHealthRecord.isLocked || false;

        const toggleLock = () => { 
            playSound('tap'); 
            if(confirm(`ยืนยันการ${!isHealthLocked ? 'ล็อก' : 'ปลดล็อก'}ข้อมูลของเดือนนี้?`)) {
                const newLockedState = !isHealthLocked;
                const updatedRecord = { ...activeHealthRecord, isLocked: newLockedState };
                setHealthRecords(prev => { const filtered = prev.filter(r => r.date !== currentHealthDate); return [...filtered, updatedRecord]; });
                showToast(newLockedState ? 'บันทึกและล็อกข้อมูลแล้ว' : 'ปลดล็อกแก้ไขได้'); 
            }
        };

        const updateHealth = (studentId, field, value) => { 
            if(isHealthLocked) return; 
            const newHealthData = { ...healthData, [studentId]: { ...(healthData[studentId] || {w:'', h:''}), [field]: value } };
            const updatedRecord = { ...activeHealthRecord, data: newHealthData };
            setHealthRecords(prev => { const filtered = prev.filter(r => r.date !== currentHealthDate); return [...filtered, updatedRecord]; });
        };

        return (
          <div className="animate-in fade-in space-y-4 max-w-[600px] mx-auto">
            <div className="bg-white p-4 rounded-[20px] shadow-sm border border-slate-100">
                <div className="flex justify-between items-center mb-4">
                    <div className="flex items-center gap-2">
                        <div className="w-8 h-8 bg-rose-500 text-white rounded-lg flex items-center justify-center shadow-sm"><i className="fas fa-weight-scale text-sm"></i></div>
                        <div><h1 className="text-[16px] font-black text-slate-800">ข้อมูลสุขภาพ</h1></div>
                    </div>
                    <input type="month" value={currentHealthDate} onChange={e => {playSound('tap'); setCurrentHealthDate(e.target.value);}} className="bg-rose-50 text-rose-600 border border-rose-100 px-3 py-1.5 rounded-lg text-xs font-bold outline-none cursor-pointer" />
                </div>

                <div className="flex gap-2 mb-3">
                     {isHealthLocked ? (
                         <button onClick={toggleLock} className="w-full py-2.5 bg-[#1e293b] text-white rounded-xl font-bold text-xs shadow-md hover:bg-black transition-all"><i className="fas fa-lock mr-1 text-slate-300"></i> บันทึกแล้ว (กดแก้)</button>
                     ) : (
                         <button onClick={toggleLock} className="w-full py-2.5 bg-rose-500 text-white rounded-xl font-bold text-xs shadow-md hover:bg-rose-600 transition-all"><i className="fas fa-save mr-1"></i> บันทึกข้อมูลและล็อก</button>
                     )}
                 </div>

                <div className="grid grid-cols-3 gap-2 pt-3 border-t border-slate-100 border-dashed">
                    <button onClick={() => executeDocExport('pdf', 'pdf-health-container', `สุขภาพ_${currentHealthDate}`)} className="py-2 bg-red-50/50 text-red-600 rounded-xl text-[11px] font-bold hover:bg-red-50 transition border border-red-100/50"><i className="fas fa-file-pdf"></i> PDF</button>
                    <button onClick={() => executeDocExport('img', 'pdf-health-container', `สุขภาพ_${currentHealthDate}`)} className="py-2 bg-blue-50/50 text-blue-600 rounded-xl text-[11px] font-bold hover:bg-blue-50 transition border border-blue-100/50"><i className="fas fa-image"></i> รูปภาพ</button>
                    <button onClick={() => exportExcel('health', currentHealthDate)} className="py-2 bg-green-50/50 text-green-600 rounded-xl text-[11px] font-bold hover:bg-green-50 transition border border-green-100/50"><i className="fas fa-file-excel"></i> Excel</button>
                </div>
            </div>
            
            <div className="bg-white rounded-[20px] shadow-sm border border-slate-100 overflow-hidden pb-6">
                <div className="bg-slate-800 text-white font-bold text-[11px] p-3 text-center flex">
                    <div className="flex-[2] text-left pl-2">ชื่อนักเรียน</div><div className="flex-1">น้ำหนัก</div><div className="flex-1">ส่วนสูง</div><div className="flex-1 hidden sm:block">BMI</div>
                </div>
                <div className="divide-y divide-slate-100">
                    {sortedStudents.length === 0 ? <p className="text-center text-slate-400 text-sm py-8">ไม่มีรายชื่อนักเรียน</p> : sortedStudents.map(s => {
                        const hData = healthData[s.id] || {w:'', h:''}; 
                        const bmiData = calculateBMI(hData.w, hData.h, s.name); 
                        const active = isActive(s);
                        return (
                            <div key={s.id} className={`flex items-center p-2.5 hover:bg-slate-50 transition-colors ${!active ? 'opacity-60 bg-slate-100' : ''}`}>
                                <div className="flex-[2] font-bold text-slate-700 truncate pr-2 text-xs flex items-center gap-2">
                                    <span className="text-slate-400">{s.number || ''}.</span>
                                    <span className="truncate" style={{ textDecoration: !active ? 'line-through' : 'none' }}>{s.name || ''}</span>
                                </div>
                                <div className="flex-1 px-1">
                                    <input type="number" disabled={isHealthLocked || !active} value={hData.w || ''} onChange={e=>updateHealth(s.id, 'w', e.target.value)} placeholder="กก." className={`w-full rounded-lg p-1.5 text-center font-bold outline-none text-xs ${isHealthLocked || !active ? 'bg-transparent text-slate-500' : 'bg-slate-50 border border-slate-200 text-slate-700 focus:border-rose-400'}`} />
                                </div>
                                <div className="flex-1 px-1">
                                    <input type="number" disabled={isHealthLocked || !active} value={hData.h || ''} onChange={e=>updateHealth(s.id, 'h', e.target.value)} placeholder="ซม." className={`w-full rounded-lg p-1.5 text-center font-bold outline-none text-xs ${isHealthLocked || !active ? 'bg-transparent text-slate-500' : 'bg-slate-50 border border-slate-200 text-slate-700 focus:border-rose-400'}`} />
                                </div>
                                <div className="flex-1 hidden sm:flex justify-center px-1 relative group">
                                    <div className={`px-1 py-1 rounded text-[10px] font-bold w-full text-center ${!active ? 'bg-slate-200 text-slate-400 border border-slate-300' : `${bmiData.bg} ${bmiData.color}`}`}>{!active ? '-' : (bmiData.bmi > 0 ? bmiData.bmi : '-')}</div>
                                    <div className="absolute hidden group-hover:block -top-8 bg-slate-800 text-white text-[9px] px-2 py-1 rounded shadow-lg whitespace-nowrap z-10">ระบบดักเพศ: {bmiData.gender}</div>
                                </div>
                            </div>
                        )
                    })}
                </div>

                <div className="mx-4 mt-6 bg-slate-50/80 p-3 rounded-xl border border-slate-100">

                        <div className="bg-orange-50 border border-orange-100 rounded-xl p-1.5"><p className="text-orange-600 font-bold text-[10px]">อ้วน</p><p className="text-orange-400 font-medium text-[9px]">25.0 - 29.9</p></div>
                        <div className="bg-red-50 border border-red-100 rounded-xl p-1.5"><p className="text-red-600 font-bold text-[10px]">อ้วนมาก</p><p className="text-red-400 font-medium text-[9px]">&gt; 30.0</p></div>
