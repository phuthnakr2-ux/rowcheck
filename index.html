<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RowCheck - เช็คชื่อหน้าเสาธง</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  
  <!-- Export Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <!-- QR Code Scanner & Generator -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    html, body { font-family: 'Prompt', sans-serif !important; background-color: #F8F9FA; overscroll-behavior: none; -webkit-overflow-scrolling: touch; }
    .font-sarabun { font-family: 'Sarabun', sans-serif !important; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; display: none; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    
    /* PDF Report Layout - บังคับขนาด A4 หน้าเดียว */
    #pdf-report-container { width: 794px; min-height: 1123px; padding: 25px 40px; box-sizing: border-box; background-color: white; display: flex; flex-direction: column; overflow: hidden; }
    .pdf-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 5px; border: 1px solid #d8b4fe; border-radius: 8px; overflow: hidden; }
    .pdf-table th, .pdf-table td { border-bottom: 1px solid #e9d5ff; border-right: 1px solid #e9d5ff; vertical-align: middle; text-align: center; }
    .pdf-table th:last-child, .pdf-table td:last-child { border-right: none; }
    .pdf-table tbody tr:last-child td { border-bottom: none; }
    .pdf-table th { background: linear-gradient(135deg, #8b5cf6 0%, #c026d3 100%); color: white; font-weight: 700; font-size: 13px; padding: 4px 2px; }
    .pdf-table tbody tr:nth-child(even) { background-color: #faf5ff; }
    .pdf-table tbody tr:nth-child(odd) { background-color: #ffffff; }
    .text-left-pdf { text-align: left !important; padding-left: 8px !important; font-weight: 600; color: #4c1d95; }
    
    /* PDF Student ID Card Layout - หน้าละ 9 ใบ */
    .page-break { page-break-before: always; }
    .pdf-page-chunk { width: 794px; height: 1123px; padding: 20px 30px; box-sizing: border-box; background-color: white; display: flex; flex-direction: column; overflow: hidden; }
    
    .signature-pad { touch-action: none; background-color: white; border: 2px dashed #cbd5e1; border-radius: 12px; cursor: crosshair; }
    .donut-chart { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .donut-inner { width: 85px; height: 85px; background-color: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    #reader { width: 100%; border-radius: 16px; overflow: hidden; border: 2px solid #8b5cf6; }
    #reader video { object-fit: cover; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ==========================================
    // 🔗 ลิงก์ API หลังบ้านของคุณ (ฝังให้เรียบร้อยแล้ว)
    // ==========================================
    const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVFk7ASZJ4KzyipPtBWl5fxrSZvpqj1EjrFcCJi3QD9mw48yBnlOxD_hgsjBXULzhaLg/exec"; 

    // --- Audio System ---
    let globalAudioContext = null;
    const initAudio = () => {
      if (!globalAudioContext) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
          globalAudioContext = new AudioContext();
          const osc = globalAudioContext.createOscillator(); osc.connect(globalAudioContext.destination);
          osc.start(); osc.stop(globalAudioContext.currentTime + 0.001);
        }
      }
    };
    const playSound = (type) => {
      try {
        if (!globalAudioContext) return;
        const ctx = globalAudioContext; if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'success') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime); osc.frequency.setValueAtTime(800, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'tap') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.05);
        } else if (type === 'scan') {
          osc.type = 'triangle'; osc.frequency.setValueAtTime(1200, ctx.currentTime); osc.frequency.setValueAtTime(1600, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.2);
        }
      } catch(e) {}
    };

    const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    const formatDateObj = (dateStr) => { if(!dateStr) return ''; const d = new Date(dateStr); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()+543}`; };
    const formatShortDate = (dateStr) => { if(!dateStr) return ''; const d = new Date(dateStr); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; };
    const getDatesBetween = (startStr, endStr) => { 
        const dates = []; let curr = new Date(startStr); const end = new Date(endStr); 
        while (curr <= end) { dates.push(curr.toISOString().split('T')[0]); curr.setDate(curr.getDate() + 1); } 
        return dates; 
    };

    const QRCodeCanvas = ({ text, size }) => {
        const qrRef = useRef(null);
        useEffect(() => {
            if (window.QRious && qrRef.current) new window.QRious({ element: qrRef.current, value: text, size: size, level: 'H' });
        }, [text, size]);
        return <canvas ref={qrRef} className="rounded-lg shadow-sm border border-slate-100"></canvas>;
    };

    const initialSettings = { roomName: "ม.1/1", teacherName: "", signerRole: "ครูที่ปรึกษา", signatureImg: "" };

    function App() {
      const [activeTab, setActiveTab] = useState('check'); 
      const [toast, setToast] = useState('');
      const loadData = (key, fallback) => { try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; } catch(e) { return fallback; } };
      
      const [settings, setSettings] = useState(() => loadData('rc_pro_final_settings', initialSettings));
      const [students, setStudents] = useState(() => loadData('rc_pro_final_students', []));
      const [records, setRecords] = useState(() => loadData('rc_pro_final_records', []));

      const [checkMode, setCheckMode] = useState('manual');
      const [scannerActive, setScannerActive] = useState(false);
      const [lastScanned, setLastScanned] = useState(null);
      const html5QrCodeRef = useRef(null);
      
      const [currentDate, setCurrentDate] = useState(() => new Date().toISOString().split('T')[0]);
      const [attendance, setAttendance] = useState({}); 
      const [notes, setNotes] = useState({}); 
      const [tempNotes, setTempNotes] = useState({}); 
      const [isLocked, setIsLocked] = useState(false); 
      const [isSyncing, setIsSyncing] = useState(false);

      const [reportStartDate, setReportStartDate] = useState(() => new Date().toISOString().split('T')[0]);
      const [reportEndDate, setReportEndDate] = useState(() => new Date().toISOString().split('T')[0]);
      const [quickDateMode, setQuickDateMode] = useState('today');
      const [exportFilter, setExportFilter] = useState('all'); 
      const [isExporting, setIsExporting] = useState(false);
      const [isGeneratingDoc, setIsGeneratingDoc] = useState('');

      const [tempSettings, setTempSettings] = useState(settings);
      const [bulkIds, setBulkIds] = useState('');
      const [bulkNames, setBulkNames] = useState('');
      const [editingStudentId, setEditingStudentId] = useState(null);
      const [editStudentName, setEditStudentName] = useState('');
      const [editStudentNumber, setEditStudentNumber] = useState('');
      const [imageUploadingId, setImageUploadingId] = useState(null);
      const [selectedForPrint, setSelectedForPrint] = useState([]);
      const [selectedQRStudent, setSelectedQRStudent] = useState(null);
      
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [isSigLocked, setIsSigLocked] = useState(true);

      // --- Cloud Sync API ---
      const fetchInitialData = async () => {
          if(!GOOGLE_APP_SCRIPT_URL) return;
          setIsSyncing(true);
          try {
              const res = await fetch(`${GOOGLE_APP_SCRIPT_URL}?action=getInitialData`);
              const json = await res.json();
              if(json && json.status === 'success') {
                  if(Object.keys(json.settings).length > 0) { setSettings(json.settings); setTempSettings(json.settings); }
                  if(json.students && json.students.length > 0) setStudents(json.students);
                  if(json.records && json.records.length > 0) setRecords(json.records);
              }
          } catch(e) { console.error("Cloud fetch failed", e); }
          setIsSyncing(false);
      };

      const syncDataToCloud = async (action, payload) => {
          if(!GOOGLE_APP_SCRIPT_URL) return;
          setIsSyncing(true);
          try {
              await fetch(GOOGLE_APP_SCRIPT_URL, {
                  method: 'POST',
                  body: JSON.stringify({ action, payload })
              });
          } catch(e) { console.error("Cloud sync failed", e); }
          setIsSyncing(false);
      };

      // โหลดครั้งแรก
      useEffect(() => { fetchInitialData(); }, []);

      useEffect(() => {
          localStorage.setItem('rc_pro_final_settings', JSON.stringify(settings));
          localStorage.setItem('rc_pro_final_students', JSON.stringify(students));
          localStorage.setItem('rc_pro_final_records', JSON.stringify(records));
      }, [settings, students, records]);

      useEffect(() => {
          setSelectedForPrint(students.filter(s=>s.status!=='none' && s.status!=='moved').map(s => s.id));
      }, [students.length]);

      useEffect(() => {
          const existRecord = records.find(r => r.date === currentDate);
          if (existRecord) {
              setAttendance(existRecord.data || {}); 
              setNotes(existRecord.notes || {}); 
              setTempNotes(existRecord.notes || {}); 
              setIsLocked(true); 
          } else {
              const initialAtt = {};
              students.forEach(s => { if (!s.status || s.status === 'active') initialAtt[s.id] = 'present'; });
              setAttendance(initialAtt); setNotes({}); setTempNotes({}); setIsLocked(false); 
          }
      }, [currentDate, students, records]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

      // --- QR Scanner ---
      useEffect(() => {
          if (checkMode === 'qr' && activeTab === 'check') startScanner();
          else stopScanner();
          return () => stopScanner();
      }, [checkMode, activeTab]);

      const startScanner = () => {
          if (!html5QrCodeRef.current) html5QrCodeRef.current = new Html5Qrcode("reader");
          if (!scannerActive) {
              html5QrCodeRef.current.start(
                  { facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
                  (decodedText) => handleScanSuccess(decodedText),
                  (errorMessage) => { }
              ).then(() => setScannerActive(true)).catch(err => {
                  showToast("ไม่สามารถเปิดกล้องได้"); setCheckMode('manual');
              });
          }
      };

      const stopScanner = () => {
          if (html5QrCodeRef.current && scannerActive) {
              html5QrCodeRef.current.stop().then(() => setScannerActive(false)).catch(err => console.error(err));
          }
      };

      const handleScanSuccess = (decodedText) => {
          if (isLocked) { showToast('ล็อคการเช็คชื่ออยู่ กรุณาปลดล็อค'); return; }
          const student = students.find(s => s.id === decodedText.trim()); 
          if (student) {
              initAudio(); playSound('scan');
              setAttendance(prev => ({ ...prev, [student.id]: 'present' }));
              setLastScanned(student);
              showToast(`สแกนสำเร็จ: ${student.name}`);
              setTimeout(() => setLastScanned(null), 2500);
          }
      };

      // --- Check-in Functions ---
      const setStatusDirectly = (studentId, status) => {
          if (isLocked) return;
          initAudio(); playSound('tap');
          setAttendance(prev => ({ ...prev, [studentId]: status }));
          if (status === 'present') {
              setTempNotes(prev => { const n = {...prev}; delete n[studentId]; return n; });
          }
      };

      const saveIndividualNote = (studentId) => {
          if (isLocked) return;
          initAudio(); playSound('success');
          setNotes(prev => ({ ...prev, [studentId]: tempNotes[studentId] }));
          showToast('บันทึกหมายเหตุแล้ว 💾');
      };

      const setAllStatus = (status) => {
          if (isLocked) return;
          initAudio(); playSound('tap');
          const newAtt = { ...attendance };
          students.forEach(s => { if (!s.status || s.status === 'active') newAtt[s.id] = status; });
          setAttendance(newAtt);
      };

      const saveAttendance = () => {
          initAudio(); playSound('success');
          const newRecord = { id: generateId(), date: currentDate, timestamp: new Date().toISOString(), data: attendance, notes: tempNotes };
          const filteredRecords = records.filter(r => r.date !== currentDate);
          setRecords([...filteredRecords, newRecord]);
          setNotes(tempNotes); 
          setIsLocked(true); 
          syncDataToCloud('saveAttendance', newRecord);
          showToast('บันทึกและล็อคข้อมูลเรียบร้อย! 🔒');
      };

      const unlockAttendance = () => { initAudio(); playSound('unlock'); setIsLocked(false); showToast('ปลดล็อคแล้ว สามารถแก้ไขได้ 🔓'); };

      const currentSummary = useMemo(() => {
          let p = 0, a = 0, e = 0, totalActive = 0;
          students.forEach(s => {
              if (!s.status || s.status === 'active') {
                  totalActive++;
                  const st = attendance[s.id] || 'present';
                  if(st==='present') p++; else if(st==='absent') a++; else if(st==='excused') e++;
              }
          });
          return { total: totalActive, p, a, e };
      }, [attendance, students]);

      // --- Stats & Report Functions ---
      const handleQuickDate = (mode) => {
          initAudio(); playSound('tap'); setQuickDateMode(mode);
          const today = new Date(); let s = '', e = '';
          if (mode === 'today') { s = today.toISOString().split('T')[0]; e = s; } 
          else if (mode === 'week') {
              const day = today.getDay(); const diffToMonday = today.getDate() - day + (day === 0 ? -6 : 1);
              const monday = new Date(today.setDate(diffToMonday)); const friday = new Date(monday); friday.setDate(monday.getDate() + 4);
              s = monday.toISOString().split('T')[0]; e = friday.toISOString().split('T')[0];
          } else if (mode === 'month') {
              const firstDay = new Date(today.getFullYear(), today.getMonth(), 1); const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
              s = firstDay.toISOString().split('T')[0]; e = lastDay.toISOString().split('T')[0];
          }
          if (mode !== 'custom') { setReportStartDate(s); setReportEndDate(e); }
      };

      const reportDateList = useMemo(() => getDatesBetween(reportStartDate, reportEndDate), [reportStartDate, reportEndDate]);
      
      const getStudentsForExport = () => {
          let list = [...students].sort((a,b)=>a.number-b.number);
          if (exportFilter === 'all') return list;

          list = list.filter(s => {
              if (s.status === 'moved' || s.status === 'none') return true; 
              let match = false;
              for (const date of reportDateList) {
                  const dRec = records.find(r => r.date === date);
                  const st = dRec?.data?.[s.id];
                  if (exportFilter === 'present' && st === 'present') match = true;
                  if (exportFilter === 'absent' && st === 'absent') match = true;
                  if (exportFilter === 'excused' && st === 'excused') match = true;
                  if (exportFilter === 'absent_excused' && (st === 'absent' || st === 'excused')) match = true;
              }
              return match;
          });
          return list;
      };

      const exportList = getStudentsForExport();

      const reportSummary = useMemo(() => {
          let p = 0, a = 0, e = 0;
          reportDateList.forEach(date => {
              const dRec = records.find(r => r.date === date);
              if (dRec) {
                  students.forEach(s => {
                      if (!s.status || s.status === 'active') {
                          const st = dRec?.data?.[s.id];
                          if(st === 'present') p++;
                          if(st === 'absent') a++;
                          if(st === 'excused') e++;
                      }
                  });
              }
          });
          const total = p + a + e;
          return { p, a, e, total };
      }, [reportDateList, records, students]);

      const getDonutStyle = () => {
          const total = reportSummary.total;
          if (total === 0) return { background: '#f1f5f9' };
          const pPct = Math.round((reportSummary.p/total)*100);
          const aPct = Math.round((reportSummary.a/total)*100);
          return { background: `conic-gradient(#10b981 0% ${pPct}%, #ef4444 ${pPct}% ${pPct + aPct}%, #3b82f6 ${pPct + aPct}% 100%)` };
      };

      const getIndividualStats = (studentId) => {
          let p = 0, a = 0, e = 0;
          records.forEach(r => {
              const st = r?.data?.[studentId];
              if (st === 'present') p++;
              if (st === 'absent') a++;
              if (st === 'excused') e++;
          });
          return { p, a, e };
      };

      // --- Settings & Canvas ---
      const getCanvasPos = (e, canvas) => {
          const rect = canvas.getBoundingClientRect();
          if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
          return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };
      const startDrawing = (e) => {
          if (isSigLocked) return;
          setIsDrawing(true); const ctx = canvasRef.current.getContext('2d');
          const pos = getCanvasPos(e.nativeEvent || e, canvasRef.current);
          ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
      };
      const draw = (e) => {
          if (!isDrawing || isSigLocked) return;
          e.preventDefault(); 
          const ctx = canvasRef.current.getContext('2d');
          const pos = getCanvasPos(e.nativeEvent || e, canvasRef.current);
          ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#4c1d95'; 
          ctx.lineTo(pos.x, pos.y); ctx.stroke();
      };
      const stopDrawing = () => {
          if (isDrawing && !isSigLocked) { setIsDrawing(false); setTempSettings({...tempSettings, signatureImg: canvasRef.current.toDataURL('image/png')}); }
      };
      const clearSignature = () => {
          if (isSigLocked) return;
          initAudio(); playSound('tap');
          const canvas = canvasRef.current; canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
          setTempSettings({...tempSettings, signatureImg: ''});
      };
      useEffect(() => {
          if (activeTab === 'settings' && canvasRef.current && tempSettings.signatureImg) {
              const canvas = canvasRef.current; const ctx = canvas.getContext('2d');
              const img = new Image();
              img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
              img.src = tempSettings.signatureImg;
          }
      }, [activeTab]);

      const saveSettings = () => {
          initAudio(); playSound('success'); 
          setSettings(tempSettings); 
          setIsSigLocked(true); 
          syncDataToCloud('saveSettings', tempSettings);
          showToast('บันทึกการตั้งค่าแล้ว 💾');
      };

      const handleImageUpload = (e, studentId) => {
          const file = e.target.files[0];
          if(!file) return;
          initAudio(); playSound('tap'); setImageUploadingId(studentId); 
          const reader = new FileReader();
          reader.onload = (event) => {
              const img = new Image();
              img.onload = async () => {
                  const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                  const MAX_SIZE = 300; let width = img.width; let height = img.height;
                  if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                  else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                  canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
                  const base64Data = canvas.toDataURL('image/jpeg', 0.8);
                  
                  // อัปเดต UI ชั่วคราวก่อนเผื่อเน็ตช้า
                  setStudents(prev => prev.map(s => s.id === studentId ? { ...s, image: base64Data } : s));
                  
                  // ส่งขึ้น Drive ถ้ามี URL
                  if(GOOGLE_APP_SCRIPT_URL) {
                      try {
                          const res = await fetch(GOOGLE_APP_SCRIPT_URL, {
                              method: 'POST',
                              body: JSON.stringify({ action: 'uploadImage', payload: { studentId, base64: base64Data } })
                          });
                          const json = await res.json();
                          if(json && json.status === 'success' && json.data.imageUrl) {
                              const newImage = json.data.imageUrl;
                              setStudents(prev => {
                                  const updated = prev.map(s => s.id === studentId ? { ...s, image: newImage } : s);
                                  syncDataToCloud('saveStudents', updated);
                                  return updated;
                              });
                          }
                      } catch (err) {}
                  }

                  setImageUploadingId(null); showToast('อัปโหลดรูปภาพสำเร็จ');
              };
              img.src = event.target.result;
          };
          reader.readAsDataURL(file);
      };

      const handleAddStudents = () => {
          if (!bulkNames.trim() && !bulkIds.trim()) { showToast('กรุณากรอกข้อมูลให้ครบถ้วน'); return; }
          initAudio(); playSound('tap');
          
          const idsArray = bulkIds.split('\n').map(l => l.trim());
          const namesArray = bulkNames.split('\n').map(l => l.trim());
          const newStudents = [...students];
          const linesCount = Math.max(idsArray.length, namesArray.length);

              const finalId = idStr || generateId();
              newStudents.push({ id: finalId, number: num, name: cleanName, status: 'active', image: '' });
          }

                                   return (
                                       <tr key={s.id} style={{ height: pdfStyles.rowHeight }}>
                                           <td style={{ color: '#6b7280', fontWeight: 'bold', padding: pdfStyles.padding, fontSize: pdfStyles.fontSize }}>{s.number}</td>
                                           <td className="text-left-pdf" style={{ padding: pdfStyles.padding, fontSize: pdfStyles.fontSize }}>{s.name}</td>
                                           <td style={{ fontWeight: '900', fontSize: '14px', color: textColor, padding: pdfStyles.padding }}>{label}</td>
                                           <td style={{fontSize: pdfStyles.fontSize, color: '#64748b', fontWeight: '600', padding: pdfStyles.padding}}>{note}</td>
                                       </tr>
                                   )
                               } else {
                                   let p = 0, a = 0, e = 0;
                                   reportDateList.forEach(date => {
                                       const dRec = records.find(r => r.date === date);
                                       if (dRec?.data?.[s.id]) {
                                           const st = dRec.data[s.id];
                                           if (st === 'present') p++;
                                           if (st === 'absent') a++;
                                           if (st === 'excused') e++;
                                       }
                                   });
                                   return (
                                       <tr key={s.id} style={{ height: pdfStyles.rowHeight }}>
                                           <td style={{ color: '#6b7280', fontWeight: 'bold', padding: pdfStyles.padding, fontSize: pdfStyles.fontSize }}>{s.number}</td>
                                           <td className="text-left-pdf" style={{ padding: pdfStyles.padding, fontSize: pdfStyles.fontSize }}>{s.name} {isNotActive ? `(${s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน'})` : ''}</td>
                                           <td style={{ fontWeight: 'bold', fontSize: '13px', color: '#10b981', padding: pdfStyles.padding }}>{isNotActive ? '-' : p}</td>
                                           <td style={{ fontWeight: 'bold', fontSize: '13px', color: '#ef4444', padding: pdfStyles.padding }}>{isNotActive ? '-' : a}</td>
                                           <td style={{ fontWeight: 'bold', fontSize: '13px', color: '#3b82f6', padding: pdfStyles.padding }}>{isNotActive ? '-' : e}</td>
                                       </tr>
                                   )
                               }
                            })}
                        </tbody>
                      </table>
                  </div>

                  <div style={{ flexShrink: 0, marginTop: 'auto', paddingTop: '10px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                      <div style={{ fontSize: '12px', color: '#4c1d95', backgroundColor: '#f3e8ff', padding: '6px 12px', borderRadius: '8px', border: '1px solid #d8b4fe' }}>
                          <b>คำอธิบาย:</b> <span style={{color: '#10b981', fontWeight: 'bold'}}>✓ มา</span>, <span style={{color: '#ef4444', fontWeight: 'bold'}}>ข ขาด</span>, <span style={{color: '#3b82f6', fontWeight: 'bold'}}>ล ลา</span>
                      </div>
                      
                      <div style={{ textAlign: 'center', color: '#4c1d95', minWidth: '220px' }}>
                          <p style={{ fontSize: '13px', marginBottom: '5px' }}>ลงชื่อ{settings.signerRole || 'ผู้ประเมิน'}</p>
                          {settings.signatureImg ? (
                              <img src={settings.signatureImg} style={{ height: '40px', objectFit: 'contain', margin: '0 auto', display: 'block' }} />
                          ) : (
                              <div style={{ height: '35px', lineHeight: '35px' }}>...................................................</div>
                          )}
                          <p style={{ fontSize: '13px', fontWeight: 'bold', marginTop: '5px' }}>( {settings.teacherName || '...........................................'} )</p>
                      </div>
                  </div>
             </div>
             
             {/* ----------------- โครงสร้างบัตรนักเรียนรวม (แบ่งหน้าด้วย Chunk หน้าละ 9 ใบ) ----------------- */}
             <div id="pdf-qr-container" className="font-sarabun text-slate-800" style={{ position: 'absolute', left: '-9999px', top: 0, backgroundColor: 'white' }}>
                  {cardChunks.map((chunk, chunkIndex) => (
                      <div key={chunkIndex} className={`pdf-page-chunk ${chunkIndex > 0 ? 'page-break' : ''}`}>
                          <div className="text-center mb-6 pb-4 border-b-2 border-violet-500">
                              <h1 className="text-[24px] font-bold text-violet-900">บัตรประจำตัวนักเรียนสำหรับเช็คชื่อ</h1>
                              <h2 className="text-[16px] text-violet-700">ชั้นมัธยมศึกษาปีที่ {formattedRoomName}</h2>
                              <p className="text-[12px] text-slate-500 mt-1">* กรุณาตัดตามรอย และให้นักเรียนเก็บไว้สำหรับสแกนเข้าแถว</p>
                          </div>
                          
                          <div className="grid grid-cols-3 gap-5">
                              {chunk.map(s => (
                                  <div key={s.id} className="border border-slate-300 rounded-2xl overflow-hidden flex flex-col shadow-sm">
                                      <div className="bg-violet-600 py-1.5 text-center">
                                          <h2 className="text-white font-black text-xs tracking-wide">RowCheck</h2>
                                      </div>
                                      <div className="p-4 flex flex-col items-center bg-white flex-1 relative">
                                          <div className="w-16 h-20 bg-slate-100 border-2 border-slate-200 rounded-lg mb-2 overflow-hidden flex items-center justify-center">
                                              {s.image ? <img src={s.image} className="w-full h-full object-cover" /> : <i className="fas fa-user text-slate-300 text-2xl"></i>}
                                          </div>
                                          <div className="mb-2 border border-slate-100 p-1 rounded-lg">
                                              <QRCodeCanvas text={s.id} size={85} />
                                          </div>
                                          <h3 className="font-bold text-slate-800 text-[13px] text-center mb-1 leading-tight h-8 overflow-hidden">{s.name}</h3>
                                          <p className="text-slate-500 font-bold text-[10px]">เลขที่ {s.number} <span className="mx-1">|</span> รหัส {s.id.substring(0,6).toUpperCase()}</p>
                                      </div>
                                      <div className="bg-violet-600 py-1.5 text-center">
                                          <p className="text-white text-[10px] font-bold">ห้อง : {settings.roomName}</p>
                                      </div>
                                  </div>
                              ))}
                          </div>
                      </div>
                  ))}
             </div>
           </div>

           {/* Bottom Navigation */}
           <div className="fixed bottom-4 left-4 right-4 bg-white/90 backdrop-blur-xl border border-slate-200/50 rounded-2xl flex p-2 z-40 shadow-2xl shadow-slate-200 max-w-md mx-auto">
                <button onClick={() => {setActiveTab('check'); initAudio(); playSound('tap');}} className={`flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${activeTab==='check'?'bg-violet-100 text-violet-700 font-black shadow-inner':'text-slate-400 font-bold hover:bg-slate-50'}`}>
                    <i className="fas fa-clipboard-check text-lg mb-1"></i><span className="text-[10px]">เช็คชื่อ</span>
                </button>
                <button onClick={() => {setActiveTab('report'); initAudio(); playSound('tap');}} className={`flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${activeTab==='report'?'bg-violet-100 text-violet-700 font-black shadow-inner':'text-slate-400 font-bold hover:bg-slate-50'}`}>
                    <i className="fas fa-file-export text-lg mb-1"></i><span className="text-[10px]">รายงาน</span>
                </button>
                <button onClick={() => {setActiveTab('settings'); initAudio(); playSound('tap');}} className={`flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${activeTab==='settings'?'bg-violet-100 text-violet-700 font-black shadow-inner':'text-slate-400 font-bold hover:bg-slate-50'}`}>
                    <i className="fas fa-cog text-lg mb-1"></i><span className="text-[10px]">ตั้งค่า</span>
                </button>
           </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
