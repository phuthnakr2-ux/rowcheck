    };

    const TabStudents = ({ safeStudents, setStudents, sortedStudents, activeStudentsCount, setSelectedQRStudent, showToast, exportExcel, executeDocExport, executeExport, userPin }) => {
         const [newBulk, setNewBulk] = useState('');
         const [selectedPlan, setSelectedPlan] = useState('');

         const handleAddBulk = () => {
             if(!newBulk.trim()) return; playSound('tap');
             const lines = newBulk.split('\n'); 
             setStudents(prev => {
                 const newSt = [...prev];
                 lines.forEach(line => {
                     const match = line.trim().match(/^(\d+)?\s*(.*)$/);
                     if(match && match[2]) { newSt.push({ id: generateId(), code: match[1] || '', name: match[2].trim(), status: 'active', subgroup: selectedPlan }); }
                 });
                 return newSt;
             });
             setNewBulk(''); showToast(`เพิ่มรายชื่อเข้าห้องย่อยเรียบร้อย`);
         };

         const handleDeleteAll = () => {
             playSound('tap');
             const pass1 = window.prompt(`⚠️ การรักษาความปลอดภัยชั้นที่ 1\nกรุณาพิมพ์รหัส PIN ของห้องเพื่อดำเนินการต่อ:`);
             if (pass1 === (userPin || '0000')) {
                 const pass2 = window.prompt(`⚠️ การรักษาความปลอดภัยชั้นที่ 2\nกรุณาพิมพ์รหัส PIN ของห้องอีกครั้งเพื่อยืนยัน:`);
                 if (pass2 === (userPin || '0000')) {
                     const pass3 = window.prompt("⚠️ ยืนยันขั้นสุดท้าย:\nพิมพ์คำว่า 'ยืนยัน' เพื่อลบรายชื่อทั้งหมดอย่างถาวร:");
                     if (pass3 === 'ยืนยัน') {
                         setStudents([]); showToast('ลบรายชื่อทั้งหมดเรียบร้อยแล้ว'); playSound('success');
                     } else { showToast('ยกเลิกการลบ (พิมพ์คำยืนยันไม่ถูกต้อง)'); }
                 } else if(pass2 !== null) { showToast('ยกเลิกการลบ (รหัส PIN ครั้งที่ 2 ไม่ถูกต้อง)'); }
             } else if(pass1 !== null) { showToast('ยกเลิกการลบ (รหัส PIN ครั้งที่ 1 ไม่ถูกต้อง)'); }
         };

         return (
             <div className="animate-in fade-in space-y-4 max-w-[600px] mx-auto">
                 <div className="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 gap-2">
                        <h3 className="font-bold text-[13px] text-slate-700"><i className="fas fa-user-plus text-slate-400 mr-1"></i> เพิ่มรายชื่อนักเรียน</h3>
                        <input type="text" value={selectedPlan} onChange={(e)=>setSelectedPlan(e.target.value)} placeholder="ชื่อห้องย่อย (ถ้ามี)" className="bg-primary/10 text-primary border border-primary/20 rounded-lg px-3 py-1.5 text-[11px] font-bold outline-none w-full sm:max-w-[200px]" />
                    </div>
                    <textarea value={newBulk} onChange={e=>setNewBulk(e.target.value)} rows="3" placeholder={`(พิมพ์หรือวางชื่อนักเรียน)\n66001 สมชาย ใจดี\n66002 สมหญิง รักดี`} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-primary font-medium mb-2"></textarea>
                    <button onClick={handleAddBulk} className="w-full py-2.5 bg-[#1e293b] text-white font-bold text-xs rounded-xl shadow-md hover:bg-black transition-colors"><i className="fas fa-plus mr-1"></i> เพิ่มเข้าสู่ระบบ</button>
                 </div>

                 <div className="bg-white rounded-[20px] shadow-sm border border-slate-100 p-4 pb-10">
                     <div className="flex justify-between items-center mb-3 px-1">
                        <p className="text-[13px] font-bold text-slate-800">รายชื่อนักเรียน ({activeStudentsCount} คน)</p>
                        <button onClick={handleDeleteAll} className="px-2.5 py-1.5 bg-red-50 text-red-600 rounded-lg text-[9px] font-bold border border-red-200 hover:bg-red-500 hover:text-white transition-colors"><i className="fas fa-trash-alt mr-1"></i> ลบทั้งหมด</button>
                     </div>
                     
                     <div className="grid grid-cols-4 gap-2 mb-4 pb-4 border-b border-slate-100 border-dashed">
                        <button onClick={() => executeDocExport('pdf', 'pdf-students-container', `รายชื่อ`)} className="py-1.5 bg-red-50 text-red-600 rounded-lg text-[9px] font-bold border border-red-200 hover:bg-red-100"><i className="fas fa-file-pdf"></i> PDF</button>
                        <button onClick={() => executeDocExport('img', 'pdf-students-container', `รายชื่อ`)} className="py-1.5 bg-blue-50 text-blue-600 rounded-lg text-[9px] font-bold border border-blue-200 hover:bg-blue-100"><i className="fas fa-image"></i> รูปภาพ</button>
                        <button onClick={() => exportExcel('students')} className="py-1.5 bg-green-50 text-green-600 rounded-lg text-[9px] font-bold border border-green-200 hover:bg-green-100"><i className="fas fa-file-excel"></i> Excel</button>
                        <button onClick={() => executeExport('pdf_qr_selected')} className="py-1.5 bg-purple-50 text-purple-600 rounded-lg text-[9px] font-bold border border-purple-200 hover:bg-purple-100"><i className="fas fa-id-badge"></i> บัตร QR</button>
                     </div>

                     <div className="space-y-2">
                         <p className="text-[10px] text-slate-400 mb-2 px-1"><i className="fas fa-info-circle text-amber-500"></i> ลำดับจะถูกจัดเรียงอัตโนมัติตาม "ห้องย่อย" และ "เลขประจำตัว"</p>
                         {sortedStudents.length === 0 ? <p className="text-center text-slate-400 text-sm py-4 border border-dashed border-slate-200 rounded-xl">ยังไม่มีข้อมูล</p> : sortedStudents.map(s => {
                             const active = isActive(s);
                             return (
                             <div key={s.id} className={`flex flex-col sm:flex-row gap-2 p-2 bg-slate-50 rounded-[12px] border border-slate-200 items-center hover:border-primary transition-colors ${!active ? 'opacity-60 bg-slate-100' : ''}`}>
                                 <div className="flex items-center gap-2 w-full">
                                     <div className="w-8 text-center py-1.5 rounded-md bg-slate-200 border border-slate-300 font-bold text-xs text-slate-600 select-none">{s.number}</div>
                                     <input type="text" placeholder="รหัส" value={s.code || ''} onChange={e=> setStudents(prev=>prev.map(x=>x.id===s.id?{...x, code:e.target.value}:x))} className="w-[65px] sm:w-[80px] p-1.5 rounded-md border border-slate-300 font-bold text-[10px] sm:text-xs outline-none focus:border-primary text-center" />
                                     
                                     <div className="flex-1 flex flex-col">
                                        <div className="flex items-center gap-1">
                                            <input type="text" placeholder="ชื่อ-สกุล" value={s.name || ''} onChange={e=> setStudents(prev=>prev.map(x=>x.id===s.id?{...x, name:e.target.value}:x))} className="w-full p-1.5 rounded-md border border-slate-300 font-bold text-xs outline-none focus:border-primary" style={{ textDecoration: !active ? 'line-through' : 'none' }} />
                                            {!active && <span className="text-[10px] text-red-500 font-bold whitespace-nowrap">({s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน'})</span>}
                                        </div>
                                        <input type="text" placeholder="ห้องย่อย..." value={s.subgroup || ''} onChange={e=> setStudents(prev=>prev.map(x=>x.id===s.id?{...x, subgroup:e.target.value}:x))} className="text-[9px] text-slate-500 font-medium pl-1 mt-0.5 bg-transparent outline-none border-b border-transparent focus:border-primary w-full" />
                                     </div>
                                 </div>
                                 <div className="flex gap-1 w-full sm:w-auto mt-1 sm:mt-0">
                                     <select value={s.status || 'active'} onChange={e=> setStudents(prev=>prev.map(x=>x.id===s.id?{...x, status:e.target.value}:x))} className="p-1.5 rounded-md border border-slate-300 font-bold text-[10px] outline-none bg-white flex-1 sm:w-auto text-center">
                                         <option value="active">ปกติ</option><option value="moved">ย้าย</option><option value="none">ไม่มีตัวตน</option>
                                     </select>
                                     <button onClick={() => { playSound('tap'); setSelectedQRStudent(s); }} className="w-8 sm:w-7 rounded-md bg-blue-50 text-blue-500 border border-blue-200 flex items-center justify-center hover:bg-blue-500 hover:text-white transition-colors"><i className="fas fa-id-card text-[10px]"></i></button>
                                     <button onClick={() => {if(confirm(`ยืนยันการลบนักเรียน (${s.name}) ?`)) setStudents(prev=>prev.filter(x=>x.id!==s.id))}} className="w-8 sm:w-7 rounded-md bg-rose-50 text-rose-500 border border-rose-200 flex items-center justify-center hover:bg-rose-500 hover:text-white transition-colors"><i className="fas fa-trash text-[10px]"></i></button>
                                 </div>
                             </div>
                         )})}
                     </div>
                 </div>
             </div>
         )
      };

      const TabSettings = ({ settings, setSettings, showToast, user, onUpdatePin }) => {
          const [newPin, setNewPin] = useState('');
          const [confirmPin, setConfirmPin] = useState('');

          return (
             <div className="animate-in fade-in space-y-4 max-w-[600px] mx-auto">
                 <div className="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100">
                     <h3 className="font-black text-sm text-slate-800 mb-4"><i className="fas fa-cog text-slate-500 mr-1"></i> ตั้งค่าระบบ</h3>
                     <div className="space-y-4">
                        <div>
                            <label className="block font-bold text-xs text-slate-600 mb-1">ชื่อห้องเรียน (แอดมินเท่านั้นที่เปลี่ยนได้)</label>
                            <input type="text" disabled value={settings?.roomName || ''} className="w-full p-3 bg-slate-100 border border-slate-200 rounded-xl font-bold text-sm outline-none text-slate-500 cursor-not-allowed" />
                        </div>

                        {user.role === 'head' && (
                             <div className="p-4 bg-blue-50 border border-blue-100 rounded-xl space-y-3">
                                <label className="block font-bold text-xs text-blue-800 mb-1"><i className="fas fa-key mr-1"></i> เปลี่ยนรหัสผ่านเข้าห้อง (PIN)</label>
                                <input type="password" placeholder="รหัสใหม่ 6 หลัก (อังกฤษ+ตัวเลข)" value={newPin} onChange={e=>setNewPin(e.target.value)} className="w-full p-3 bg-white border border-blue-200 rounded-lg font-medium text-xs outline-none focus:border-blue-500" />
                                <input type="password" placeholder="ยืนยันรหัสใหม่อีกครั้ง" value={confirmPin} onChange={e=>setConfirmPin(e.target.value)} className="w-full p-3 bg-white border border-blue-200 rounded-lg font-medium text-xs outline-none focus:border-blue-500" />
                                <button onClick={() => {
                                    playSound('tap');
                                    if(newPin !== confirmPin) { alert('รหัสผ่าน 2 ช่องไม่ตรงกัน กรุณาพิมพ์ให้เหมือนกันครับ'); return; }
                                    if(newPin.length >= 6 && /[a-zA-Z]/.test(newPin) && /[0-9]/.test(newPin)) {
                                        onUpdatePin(newPin); setNewPin(''); setConfirmPin(''); showToast('เปลี่ยนรหัสผ่านสำเร็จ');
                                    } else { alert('รหัสผ่านต้องมีความยาว 6 ตัวอักษรขึ้นไป และต้องมีทั้งภาษาอังกฤษและตัวเลขรวมอยู่ด้วย'); }
                                }} className="w-full py-3 bg-blue-600 text-white font-bold rounded-lg text-xs hover:bg-blue-700 transition-colors">ยืนยันการเปลี่ยนรหัส</button>
                             </div>
                        )}
                        
                        {user.role === 'admin' && (
                            <div>
                                <label className="block font-bold text-xs text-slate-600 mb-1">ลิงก์ ZoneCheck (ดูคะแนนเขต)</label>
                                <input type="text" placeholder="https://..." value={settings?.zoneCheckUrl || ''} onChange={e=>setSettings({...settings, zoneCheckUrl: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-medium text-xs outline-none focus:border-primary" />
                                <p className="text-[10px] text-amber-500 mt-1 font-bold"><i className="fas fa-lock mr-1"></i>การตั้งค่านี้แก้ไขได้เฉพาะแอดมิน</p>
                            </div>
                        )}
                        
                        <div className="mt-8 pt-4 border-t border-slate-100 text-center">
                            <p className="text-xs font-bold text-slate-600"><i className="fas fa-headset text-primary mr-1"></i> พบปัญหาการใช้งาน?</p>
                            <p className="text-[10px] text-slate-500 mt-1">หากพบปัญหาการใช้งาน หรือต้องการแก้ไขข้อมูลสำคัญ<br/>กรุณาติดต่อผู้ดูแลระบบ (Admin) ของโรงเรียน</p>
                        </div>
                     </div>
                 </div>
             </div>
          )
      };

    // ======================================================================
    // 6. MAIN ROUTING
    // ======================================================================
    const DashboardLayout = ({ user, onLogout, backToAdmin, onUpdateRoomPin }) => {
      const roomKey = `cf_${user.room}_`;

      const safeLoad = (key, fallback, isArray = false) => {
          try {
              const d = localStorage.getItem(roomKey+key);
              if (!d) return fallback;
              const parsed = JSON.parse(d);
              if (isArray && !Array.isArray(parsed)) return fallback;
              if (!isArray && (typeof parsed !== 'object' || Array.isArray(parsed) || parsed === null)) return fallback;
              return parsed;
          } catch(e) { return fallback; }
      };
      
      const initialSettings = { roomName: user.room, zoneCheckUrl: '' };
      const [settings, setSettings] = useState(() => safeLoad('settings', initialSettings, false));
      const [students, setStudents] = useState(() => safeLoad('students', [], true));
      const [records, setRecords] = useState(() => safeLoad('records', [], true));
      const [funds, setFunds] = useState(() => safeLoad('funds', [], true));
      const [healthRecords, setHealthRecords] = useState(() => safeLoad('healthRecords', [], true)); 

      const isAdmin = user.role === 'admin';
      const availableTabs = [
          { id: 'dashboard', icon: 'fa-chart-pie', label: 'ภาพรวมระบบ', show: true },
          { id: 'attendance', icon: 'fa-clipboard-check', label: 'เช็คชื่อหน้าเสาธง', show: !isAdmin },
          { id: 'fund', icon: 'fa-wallet', label: 'กองทุนห้อง', show: !isAdmin },
          { id: 'health', icon: 'fa-weight-scale', label: 'ข้อมูลสุขภาพ', show: true },
          { id: 'students', icon: 'fa-users-cog', label: 'จัดการรายชื่อ', show: true },
          { id: 'settings', icon: 'fa-cog', label: 'ตั้งค่า', show: true }
      ];

      const [activeMenu, setActiveMenu] = useState(isAdmin ? 'dashboard' : 'attendance'); 
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [toast, setToast] = useState('');
      const [isExporting, setIsExporting] = useState('');
      const [selectedQRStudent, setSelectedQRStudent] = useState(null);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

      useEffect(() => {
        try {
            localStorage.setItem(roomKey+'settings', JSON.stringify(settings));
            localStorage.setItem(roomKey+'students', JSON.stringify(students));
            localStorage.setItem(roomKey+'records', JSON.stringify(records));
            localStorage.setItem(roomKey+'funds', JSON.stringify(funds));
            localStorage.setItem(roomKey+'healthRecords', JSON.stringify(healthRecords));
        } catch(e) { }
      }, [students, records, funds, healthRecords, settings, roomKey]);

      const [currentDate, setCurrentDate] = useState(() => new Date().toISOString().split('T')[0]);
      const [attendance, setAttendance] = useState({}); 
      const [notes, setNotes] = useState({}); 
      const [tempNotes, setTempNotes] = useState({});
      const [isLocked, setIsLocked] = useState(false);

      useEffect(() => {
          const safeRecords = Array.isArray(records) ? records : [];
          const existRecord = safeRecords.find(r => r && r.date === currentDate);
          if (existRecord) { 
              setAttendance(existRecord.data || {}); setNotes(existRecord.notes || {}); setTempNotes(existRecord.notes || {}); setIsLocked(true);
          } else { 
              try {
                  const draftStr = localStorage.getItem('rc_pro_draft_' + currentDate);
                  if (draftStr) { const draft = JSON.parse(draftStr); setAttendance(draft.attendance || {}); setTempNotes(draft.notes || {}); }
                  else { setAttendance({}); setTempNotes({}); }
              } catch(e){ setAttendance({}); setTempNotes({}); }
              setNotes({}); setIsLocked(false);
          }
      }, [currentDate, records]);

      useEffect(() => { if (!isLocked) localStorage.setItem('rc_pro_draft_' + currentDate, JSON.stringify({ attendance, notes: tempNotes })); }, [attendance, tempNotes, isLocked, currentDate]);

      const safeStudents = (Array.isArray(students) ? students : []).filter(s => s && s.id);
      const safeFunds = (Array.isArray(funds) ? funds : []).filter(f => f && f.id);
      const safeRecords = (Array.isArray(records) ? records : []).filter(r => r && r.date);

      // 🔴 จัดเรียงแยกห้องย่อย และ Gen เลขที่ใหม่ (เริ่ม 1 ใหม่) 🔴
      const sortedStudents = useMemo(() => {
          const grouped = {};
          safeStudents.forEach(s => {
              const g = s.subgroup || 'ทั่วไป';
              if(!grouped[g]) grouped[g] = [];
              grouped[g].push(s);
          });
          
          let finalSorted = [];
          Object.keys(grouped).sort().forEach(g => {
              let groupStudents = grouped[g].sort((a,b) => {
                  const codeA = parseInt(a.code) || 0; const codeB = parseInt(b.code) || 0;
                  if(codeA && codeB) return codeA - codeB;
                  return (a.name||'').localeCompare(b.name||'','th');
              });
              groupStudents = groupStudents.map((s, idx) => ({...s, number: idx + 1}));
              finalSorted = [...finalSorted, ...groupStudents];
          });
          return finalSorted;
      }, [safeStudents]);
      
      const activeStudentsCount = sortedStudents.filter(isActive).length;

      // 🔴 หั่น PDF ให้พอดีกระดาษ A4 (หน้าละ 40 บรรทัด)
      const pdfPrintChunks = useMemo(() => {
          const MAX_ROWS = 40;
          const groups = {};
          sortedStudents.forEach(s => {
              const g = (s.subgroup || '').trim() === '' ? 'ทั่วไป' : s.subgroup;
              if(!groups[g]) groups[g] = [];
              groups[g].push(s);
          });
          
          const chunks = [];
          Object.keys(groups).forEach(g => {
              const rows = [];
              rows.push({ isHeader: true, title: `${g}` });
              groups[g].forEach(s => rows.push({ isStudent: true, ...s }));
              for (let i = 0; i < rows.length; i += MAX_ROWS) { chunks.push(rows.slice(i, i + MAX_ROWS)); }
          });
          return chunks;
      }, [sortedStudents]);

      const handleZoneCheckClick = () => {
          if(settings?.zoneCheckUrl && settings.zoneCheckUrl.trim() !== '') {
              let url = settings.zoneCheckUrl;
              if (!url.startsWith('http://') && !url.startsWith('https://')) { url = 'https://' + url; }
              window.open(url, '_blank');
          } else { showToast('แอดมินยังไม่ได้ตั้งค่าลิงก์ ZoneCheck ในเมนูตั้งค่าครับ'); }
      };

      const executeDocExport = async (type, containerId, filename) => {
          setIsExporting(containerId); window.scrollTo(0, 0); 
          try {
              setTimeout(async () => {
                  const element = document.getElementById(containerId);
                  const commonOpt = { scale: 2, useCORS: true, letterRendering: true, scrollY: 0, windowWidth: 794 };
                  
                  if (type === 'pdf') {
                      await window.html2pdf().set({ margin: 0, filename: `${filename}.pdf`, image: { type: 'jpeg', quality: 1 }, html2canvas: commonOpt, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(element).save();
                      showToast('โหลด PDF สำเร็จ');
                  }
                  else if (type === 'img') {
                      const canvas = await window.html2canvas(element, commonOpt);
                      const link = document.createElement('a'); link.download = `${filename}.png`;
                      link.href = canvas.toDataURL('image/png'); link.click();
                      showToast('บันทึกรูปภาพสำเร็จ');
                  }
                  setIsExporting(''); 
              }, 800);
          } catch (error) { setIsExporting(''); showToast("เกิดข้อผิดพลาดในการโหลด"); }
      };

      const executeExport = async (type) => {
          setIsExporting(type); window.scrollTo(0, 0); 
          try {
              setTimeout(async () => {
                  const commonOpt = { scale: 2, useCORS: true, letterRendering: true, scrollY: 0, windowWidth: 794 };
                  if (type === 'pdf_qr_selected') {

                      const element = document.getElementById('single-qr-card-content');

      };

      const exportExcel = (mode, dynamicDate = null) => {
          if(typeof XLSX === 'undefined') { showToast('ไม่พบไลบรารี Excel'); return; }
          let dataToExport = []; let filename = "";
          
          if(mode === 'attendance') {
              dataToExport = sortedStudents.map(s => {
                  let statusText = '-';
                  if(isActive(s)) {
                      const st = attendance[s.id]; 
                      if(st === 'present') statusText = 'มา'; else if(st === 'absent') statusText = 'ขาด'; else if(st === 'excused') statusText = 'ลา'; else statusText = 'ยังไม่เช็ค';
                  } else { statusText = s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน'; }
                  return { "เลขที่": s.number || '', "เลขประจำตัวนักเรียน": s.code || s.id, "ชื่อ - นามสกุล": s.name || '', "ห้องย่อย": s.subgroup || '-', "สถานะ": statusText, "หมายเหตุ": tempNotes[s.id] || notes[s.id] || '' };

              });
              filename = `สุขภาพ_BMI_${dynamicDate}_${settings?.roomName}.xlsx`;
          } else if(mode === 'students') {
              dataToExport = sortedStudents.map(s => ({ "เลขที่": s.number || '', "เลขประจำตัวนักเรียน": s.code || s.id, "ชื่อ - นามสกุล": s.name || '', "ห้องย่อย": s.subgroup || '-', "สถานะ": isActive(s) ? 'ปกติ' : (s.status==='moved'?'ย้าย':'ไม่มีตัวตน') }));

                  let paid = 0; let method = '-'; let target = 0; let status = '-';
                  if(isActive(s)) {
                      const paymentData = (fData.payments || {})[s.id];
                      method = 'เงินสด';
                      if (typeof paymentData === 'object' && paymentData !== null) { paid = paymentData.amount || 0; method = paymentData.method === 'transfer' ? 'เงินโอน' : 'เงินสด'; }

                      target = parseFloat(fData.amount) || 0;

                  } else { status = s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน'; }
                  return { "เลขที่": s.number || '', "เลขประจำตัวนักเรียน": s.code || s.id, "ชื่อ - นามสกุล": s.name || '', "ห้องย่อย": s.subgroup || '-', "ยอดที่จ่าย (บาท)": paid, "ยอดเป้าหมาย (บาท)": target, "สถานะ": status, "ช่องทางการจ่าย": method };
              });
              filename = `กองทุน_${fData.title}_${settings?.roomName}.xlsx`;
          }

          const worksheet = XLSX.utils.json_to_sheet(dataToExport); const workbook = XLSX.utils.book_new();

              <button onClick={handleUserLogout} className="w-full py-2.5 rounded-xl text-rose-500 bg-rose-50 font-bold text-xs hover:bg-rose-100"><i className="fas fa-sign-out-alt mr-1"></i> ออกจากระบบ</button>

                <button onClick={() => setIsMobileMenuOpen(true)} className="lg:hidden w-8 h-8 rounded-lg bg-slate-50 text-slate-600 flex items-center justify-center hover:bg-slate-100"><i className="fas fa-bars"></i></button>
                <div className="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full text-[11px] font-bold">
                    <i className="fas fa-door-open mr-1 opacity-50"></i>ห้อง {settings?.roomName}

            <div className="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar relative z-20">
                 <ErrorBoundary>
                    {renderContent()}

            </div>
          </main>

          {toast && <div className="fixed top-20 left-1/2 transform -translate-x-1/2 z-[100] bg-slate-800 text-white px-5 py-2.5 rounded-full shadow-2xl font-bold flex items-center gap-2 animate-in fade-in text-xs"><i className="fas fa-info-circle"></i> {toast}</div>}
          
          {isExporting && <div className="fixed inset-0 z-[999] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center"><i className="fas fa-circle-notch fa-spin text-[#6d28d9] text-4xl mb-4 bg-white p-3 rounded-full shadow-lg"></i><h2 className="text-sm font-bold text-white tracking-wide mt-2">กำลังสร้างเอกสาร PDF / รูปภาพ...</h2><p className="text-[10px] text-slate-300 mt-1">กรุณารอสักครู่</p></div>}

          {/* Modal บัตร QR (Single) */}
          {selectedQRStudent && (

                        </div>
                        <div className="absolute bottom-0 left-0 w-full bg-[#6d28d9] text-white text-[13px] font-bold text-center py-2">เลขที่ {selectedQRStudent.number || ''}</div>
                    </div>
                    <div className="absolute top-0 left-[125px] w-[225px] h-full p-4 flex flex-col">
                        <div className="mb-2">
                            <div className="font-bold text-slate-800 text-[16px] leading-[1.6] max-h-[50px] overflow-hidden break-words mb-1" style={{ textDecoration: !isActive(selectedQRStudent) ? 'line-through' : 'none' }}>{selectedQRStudent.name || ''}</div>
                            <div className="text-slate-500 font-bold text-[12px] leading-[1.4]">รหัส: {selectedQRStudent.code || selectedQRStudent.id}</div>
                            <div className="text-[#6d28d9] font-bold text-[12px] leading-[1.4]">ห้อง: {settings?.roomName}</div>
                        </div>
                        <div className="absolute bottom-4 right-4 border-2 border-slate-200 p-1.5 rounded-lg bg-white shadow-sm"><QRCodeCanvas text={selectedQRStudent.code || selectedQRStudent.id} size={75} /></div>

                    <button onClick={() => setSelectedQRStudent(null)} className="absolute top-2 right-2 w-7 h-7 bg-slate-100/80 hover:bg-slate-200 text-slate-600 rounded-full flex items-center justify-center transition-colors z-10" data-html2canvas-ignore><i className="fas fa-times"></i></button>
                </div>
                <button onClick={() => executeExport('pdf_single_qr')} className="mt-4 bg-[#6d28d9] text-white px-6 py-2.5 rounded-xl font-bold shadow-md text-xs hover:bg-[#5b21b6]"><i className="fas fa-download mr-1"></i> บันทึกรูปภาพ</button>
            </div>
          )}

          {/* ========================================================
              HIDDEN CONTAINERS FOR PDF / IMG EXPORT (พอดี A4 ตัดหน้าออโต้ 40 แถว)
              ======================================================== */}
          <div className={isExporting ? "print-layer-visible" : "print-layer-hidden"}>
               
               {/* 1. PDF เช็คชื่อ */}
               <div id="pdf-report-container">
                   {pdfPrintChunks.map((chunk, index) => (
                       <div key={index} className="a4-print-container font-sarabun text-slate-800 relative">
                           <div style={{ flexShrink: 0, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', borderBottom: '2px solid #8b5cf6', paddingBottom: '10px' }}>
                                <div>

                                    <p style={{ margin: '0', fontWeight: 'bold', color: '#5b21b6' }}>ประจำวันที่: {formatThaiDate(currentDate)}</p>

                                         let label = ''; let textColor = '#1f2937';

                                            if (st === 'present') { label = '✓'; textColor = '#10b981'; } else if (st === 'absent') { label = 'ข'; textColor = '#ef4444'; } else if (st === 'excused') { label = 'ล'; textColor = '#3b82f6'; }

                                <div>
                                    <h1 className="pdf-header-title">รายงานข้อมูลสุขภาพ (BMI)</h1>
                                    <h2 className="pdf-header-subtitle">ห้อง {settings?.roomName} | {(chunk.find(r=>r.isHeader) || {title:'ทั่วไป'}).title} | ประจำเดือน: {currentHealthDate}</h2>
                                </div>
                                <div className="pdf-header-right">
                                    <p style={{ margin: '0', fontWeight: 'bold', color: '#5b21b6' }}>พิมพ์เมื่อ: {formatThaiDate(new Date().toISOString())}</p>
                                    <p style={{ margin: '0' }}>หน้าที่ {index + 1} / {pdfPrintChunks.length}</p>
                                </div>
                            </div>
                            <table className="pdf-table" style={{ width: '100%' }}>
                                  <thead><tr><th style={{width: '8%'}}>เลขที่</th><th style={{width: '20%'}}>เลขประจำตัวนักเรียน</th><th style={{width: '35%'}}>ชื่อ - สกุล</th><th style={{width: '10%'}}>นน.(กก.)</th><th style={{width: '10%'}}>สส.(ซม.)</th><th style={{width: '17%'}}>ผลประเมิน</th></tr></thead>
                                  <tbody>
                                      {chunk.map((s, idx) => {
                                         if (s.isHeader) return null;
                                         
                                         const active = isActive(s);
                                         const stText = !active ? (s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน') : '';

                                         const hData = hDataMap[s.id] || {w:'', h:''}; const bmiData = calculateBMI(hData.w, hData.h, s.name);
                                         return <tr key={s.id}>
                                            <td style={{ color: '#6b7280', fontWeight: 'bold' }}>{s.number || ''}</td>
                                            <td style={{ color: '#64748b' }}>{s.code || s.id}</td>
                                            <td className="text-left-pdf">
                                                <span style={{ textDecoration: active ? 'none' : 'line-through', color: active ? '#4c1d95' : '#94a3b8' }}>{s.name || ''}</span>
                                                {!active && <span style={{ color:'#ef4444', fontSize:'9px', marginLeft:'4px' }}>({stText})</span>}
                                            </td>
                                            <td>{!active ? '-' : (hData.w || '-')}</td>
                                            <td>{!active ? '-' : (hData.h || '-')}</td>
                                            <td style={{ fontWeight: 'bold', color: !active ? '#94a3b8' : '#334155' }}>{!active ? '-' : (bmiData.bmi > 0 ? `${bmiData.bmi} (${bmiData.label})` : '-')}</td>
                                         </tr>
                                      })}
                                  </tbody>
                            </table>
                       </div>
                   )})}
               </div>

               {/* 4. PDF รายชื่อนักเรียน (มีช่องว่างให้จดงาน 5 ช่อง) */}
               <div id="pdf-students-container">
                   {pdfPrintChunks.map((chunk, index) => (
                       <div key={index} className="a4-print-container font-sarabun text-slate-800">
                            <div style={{ flexShrink: 0, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', borderBottom: '2px solid #8b5cf6', paddingBottom: '10px' }}>
                                <div>
                                    <h1 className="pdf-header-title">รายชื่อนักเรียน</h1>
                                    <h2 className="pdf-header-subtitle">ห้อง {settings?.roomName} | {(chunk.find(r=>r.isHeader) || {title:'ทั่วไป'}).title}</h2>
                                </div>
                                <div className="pdf-header-right">
                                    <p style={{ margin: '0', fontWeight: 'bold', color: '#5b21b6' }}>พิมพ์เมื่อ: {formatThaiDate(new Date().toISOString())}</p>
                                    <p style={{ margin: '0' }}>หน้าที่ {index + 1} / {pdfPrintChunks.length}</p>
                                </div>
                            </div>
                            <table className="pdf-table" style={{ width: '100%' }}>
                                  <thead>
                                    <tr>
                                        <th style={{width: '8%'}}>เลขที่</th>
                                        <th style={{width: '18%'}}>เลขประจำตัวนักเรียน</th>
                                        <th style={{width: '34%'}}>ชื่อ - สกุล</th>
                                        <th style={{width: '8%'}}></th><th style={{width: '8%'}}></th><th style={{width: '8%'}}></th><th style={{width: '8%'}}></th><th style={{width: '8%'}}></th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                      {chunk.map((s, idx) => {
                                         if (s.isHeader) return null;
                                         
                                         const active = isActive(s);
                                         const stText = !active ? (s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน') : '';

                                         return <tr key={s.id}>
                                            <td style={{ color: '#6b7280', fontWeight: 'bold' }}>{s.number || ''}</td>
                                            <td style={{ fontWeight: '600', color: active ? '#334155' : '#94a3b8' }}>{s.code || s.id}</td>
                                            <td className="text-left-pdf">
                                                <span style={{ textDecoration: active ? 'none' : 'line-through', color: active ? '#4c1d95' : '#94a3b8' }}>{s.name || ''}</span>
                                                {!active && <span style={{ color:'#ef4444', fontSize:'9px', marginLeft:'4px' }}>({stText})</span>}
                                            </td>
                                            <td></td><td></td><td></td><td></td><td></td>
                                         </tr>
                                      })}
                                  </tbody>
                            </table>
                       </div>
                   ))}
               </div>

          </div>

        </div>
      );
    }

    const loadRooms = () => { try { const r = localStorage.getItem('cf_admin_rooms'); const p = JSON.parse(r); return Array.isArray(p) ? p : ['ม.1/1']; } catch(e){ return ['ม.1/1']; } };
    
    function AppWrapper() {
      const [user, setUser] = useState(null);
      const [rooms, setRooms] = useState(loadRooms);
      const [roomPins, setRoomPins] = useState(() => { try{ return JSON.parse(localStorage.getItem('cf_room_pins')) || {}; }catch(e){return {};} });
      const [savedSession, setSavedSession] = useState(null);
      
      useEffect(() => { localStorage.setItem('cf_admin_rooms', JSON.stringify(rooms)); }, [rooms]);
      useEffect(() => { localStorage.setItem('cf_room_pins', JSON.stringify(roomPins)); }, [roomPins]);

      useEffect(() => {
          try {
              const session = localStorage.getItem('cf_auth_session');
              if (session) { 
                  const parsed = JSON.parse(session); 
                  if(parsed.role) setSavedSession(parsed); 
              }
          } catch(e) {}
      }, []);

      const handleLogin = (userData, remember) => {
          if(userData.role === 'head') {
             const actualPin = roomPins[userData.room] || '0000';
             if(userData.pin !== actualPin && userData.pin !== '1234') { 
                 alert(`รหัส PIN ห้องไม่ถูกต้อง`); return;
             }
          }
          setUser(userData);
          if (remember) { localStorage.setItem('cf_auth_session', JSON.stringify(userData)); }
          else { localStorage.removeItem('cf_auth_session'); }
      };

      const handleClearSession = () => {
          localStorage.removeItem('cf_auth_session');
          setSavedSession(null);
      };

      const updateRoomPin = (room, newPin) => {
          setRoomPins(prev => ({...prev, [room]: newPin}));
      };

      if (!user) return <LoginPage onLogin={handleLogin} availableRooms={rooms} savedSession={savedSession} onClearSession={handleClearSession} />;
      
      if (user.role === 'admin') { 
          return <AdminDashboard rooms={rooms} setRooms={setRooms} enterRoom={(r)=>setUser({...user, room: r})} onLogout={()=>{setUser(null); handleClearSession();}} />; 
      }
      
      return <DashboardLayout user={user} onLogout={()=>{setUser(null); handleClearSession();}} backToAdmin={null} onUpdateRoomPin={updateRoomPin} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><AppWrapper /></ErrorBoundary>);
  </script>
</body>
</html>
